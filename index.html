<style>
:root{

body{font-family:Georgia,'Times New Roman',serif;background:var(--fundo);color:var(--texto);line-height:1.55}

main{flex:1;padding:28px 34px;max-width:980px}
.abas{display:flex;gap:8px;margin:18px 0 22px;font-family:Arial,sans-serif}

.card{background:var(--card);border:1px solid #e3ded2;border-radius:10px;padding:22px 26px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
h2.titulo-peca{color:var(--azul);font-size:1.5rem;margin-bottom:2px}

textarea.redacao{width:100%;min-height:340px;margin-top:14px;padding:16px;font-family:'Times New Roman',serif;font-size:1rem;border:1px solid #cfc9b8;border-radius:8px;resize:vertical;line-height:1.7}

.botoes button.primario{background:var(--azul);color:#fff}

.check{margin-top:10px}

.check input{margin-top:4px;accent-color:var(--azul)}
.score{font-family:Arial,sans-serif;font-weight:bold;margin-top:12px;color:var(--azul)}

.gabarito .bloco h4{color:var(--azul);margin:10px 0 4px}
.aviso{font-size:.8rem;color:var(--cinza);font-family:Arial,sans-serif;margin-top:16px}
.home h2{color:var(--azul);margin-bottom:10px}

.home .grade .g b{color:var(--azul)}

.mat{list-style:none;padding:0}
.mat li{padding:7px 4px;border-bottom:1px dashed #eee;font-size:.94rem}

.iabox{margin-top:14px}

.iabox .resultado h4{color:var(--azul);margin:12px 0 4px}
.iabox .resultado h4:first-child{margin-top:0}
.iabox .resultado ul{margin:4px 0 8px 20px}
.iabox .resultado li{margin-bottom:4px}

.iabox .resultado .nota{display:inline-block;background:var(--azul);color:#fff;border-radius:8px;padding:6px 16px;font-family:Arial,sans-serif;font-weight:bold;margin:6px 0}
.spinner{display:inline-block;width:16px;height:16px;border:3px solid #d4dce8;border-top-color:var(--azul);border-radius:50%;animation:gira .8s linear infinite;vertical-align:middle;margin-right:8px}

.loginwrap{max-width:420px;margin:60px auto;background:#fff;border:1px solid #e3ded2;border-radius:12px;padding:30px 34px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.loginwrap h2{color:var(--azul);margin-bottom:6px}
.loginwrap p{font-size:.9rem;color:var(--cinza);margin-bottom:14px}
.loginwrap input{width:100%;padding:11px 13px;border:1px solid #cfc9b8;border-radius:6px;font-family:Arial,sans-serif;font-size:.95rem;margin-bottom:10px}
.loginwrap button{width:100%;padding:11px;border:none;border-radius:6px;background:var(--azul);color:#fff;font-size:.95rem;cursor:pointer;font-family:Arial,sans-serif}

.userbar{font-family:Arial,sans-serif;font-size:.8rem;color:var(--dourado-claro)}
.userbar a{color:#fff;margin-left:10px;cursor:pointer;text-decoration:underline}
.painel table{width:100%;border-collapse:collapse;font-size:.88rem;font-family:Arial,sans-serif;margin-top:10px}
.painel th,.painel td{border-bottom:1px solid #eee;padding:7px 8px;text-align:left}

<script>
const PECAS=[
{id:"queixa",nome:"Queixa-Crime",disc:"Estágio I",
ficha:{cabimento:"Peça inicial da ação penal privada, nos crimes que se procedem mediante queixa (ex.: crimes contra a honra — calúnia, difamação e injúria, arts. 138 a 140 do CP c/c art. 145 do CP).",prazo:"6 meses, contados do conhecimento da autoria (prazo decadencial — art. 38 do CPP).",base:"Arts. 30, 38, 41 e 44 do CPP.",end:"Juiz de Direito do Juizado Especial Criminal ou da Vara Criminal da circunscrição do local da infração (art. 70 do CPP). No DF: 'Excelentíssimo Senhor Doutor Juiz de Direito do Juizado Especial Criminal de [circunscrição]/DF'.",leg:"Ofendido (querelante), por advogado com PROCURAÇÃO COM PODERES ESPECIAIS, com menção ao fato criminoso (art. 44 do CPP)."},
estrutura:[
{t:"Endereçamento",p:"Ao juízo competente do local da consumação. Não abrevie; deixe cerca de 10 linhas antes do nome das partes.",ex:"EXCELENTÍSSIMO SENHOR DOUTOR JUIZ DE DIREITO DO JUIZADO ESPECIAL CRIMINAL DE BRASÍLIA/DF"},
{t:"Qualificação das partes",p:"Querelante (ofendido) e querelado (autor do fato), com qualificação completa: nome, nacionalidade, estado civil, profissão, RG, CPF e endereço.",ex:"FULANO DE TAL, brasileiro, casado, empresário, RG..., CPF..., residente..., por seu advogado (procuração com poderes especiais anexa), vem, respeitosamente, oferecer QUEIXA-CRIME, com fundamento no art. 41 do CPP, em face de BELTRANO..."},
{t:"Dos fatos",p:"Narre o fato criminoso com todas as circunstâncias (art. 41 do CPP), de forma objetiva e fiel à narrativa do caso.",ex:""},
{t:"Do direito",p:"Demonstre a tipicidade da conduta (classificação jurídica), a legitimidade do querelante e a tempestividade (dentro do prazo decadencial).",ex:"A conduta do querelado amolda-se ao tipo do art. 139 do CP (difamação), pois imputou ao querelante fato ofensivo à sua reputação..."},
{t:"Dos pedidos",p:"Recebimento da queixa; citação do querelado; designação de audiência (rito); oitiva das testemunhas; procedência para condenar o querelado; condenação em custas. No JECRIM, atenção à audiência preliminar de conciliação e à possibilidade de transação penal.",ex:"a) o recebimento da presente queixa-crime;\nb) a citação do querelado para responder aos termos da ação;\nc) a oitiva das testemunhas abaixo arroladas;\nd) a total procedência do pedido, condenando-se o querelado nas penas do art. 139 do CP;\ne) a condenação do querelado ao pagamento das custas processuais."},
{t:"Fechamento",p:"Rol de testemunhas, valor da causa quando exigível, local, data, advogado e OAB.",ex:"Nestes termos, pede deferimento.\nBrasília/DF, [data].\nADVOGADO — OAB/DF nº ..."}],
caso:`JOÃO BATISTA PEREIRA, brasileiro, casado, engenheiro civil, portador do RG nº 1.234.567-SSP/DF, inscrito no CPF sob o nº 111.222.333-44, residente na QE 40, conjunto B, casa 15, Guará II/DF, exerce há quatro anos, sem remuneração, o cargo de síndico do Condomínio Residencial Flores do Guará. Em 10 de maio de 2026, às 20h, durante assembleia geral ordinária realizada no salão de festas do condomínio, com a presença de aproximadamente 30 condôminos e registro em ata e em gravação audiovisual autorizada, o condômino MARCOS AURÉLIO TAVARES, brasileiro, solteiro, comerciante, residente no mesmo condomínio, ao discutir a prestação de contas, afirmou em voz alta: "o síndico desviou o dinheiro da reforma da piscina para pagar as próprias dívidas; é um ladrão e todos aqui sabem disso".

A afirmação é comprovadamente falsa: a obra da piscina atrasou por inadimplemento da construtora contratada, conforme notificação extrajudicial juntada à ata, e as contas do condomínio dos últimos três exercícios foram aprovadas por auditoria independente e pela própria assembleia. João Batista sentiu-se profundamente humilhado perante os vizinhos; nos dias seguintes, passou a ser hostilizado por moradores e cogitou renunciar ao cargo.

Em 20 de junho de 2026, João Batista procurou o Núcleo de Prática Jurídica portando: cópia da ata da assembleia, mídia com a gravação, notificação extrajudicial da construtora, relatório da auditoria e rol de três testemunhas presenciais (Ana Lúcia Ramos, Carlos Eduardo Nunes e Débora Martins, todas condôminas). Manifestou, expressamente, a intenção de ver Marcos Aurélio processado criminalmente, dispondo-se a outorgar procuração com poderes especiais.

Considerando que os fatos narrados envolvem crime de ação penal privada e que não houve, até a presente data, qualquer providência judicial, na condição de advogado(a) de João Batista, redija a peça processual cabível, observando todos os requisitos legais, com endereçamento correto, qualificação das partes, exposição do fato criminoso com todas as suas circunstâncias, classificação jurídica, rol de testemunhas e pedidos pertinentes. É vedada a mera indicação de "peça genérica". (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Queixa-crime (ação penal privada — crime contra a honra).

CLASSIFICAÇÃO: Calúnia (art. 138 do CP) — imputação falsa de fato definido como crime (apropriação indébita/peculato-equivalente na esfera privada: desvio de valores), majorada pelo art. 141, III, do CP (na presença de várias pessoas).

PONTOS ESSENCIAIS:
• Endereçamento: Juizado Especial Criminal do Guará/DF (pena máxima da calúnia majorada — verificar; sendo ≤ 2 anos, competência do JECRIM).
• Procuração com poderes especiais e menção ao fato criminoso (art. 44 do CPP).
• Tempestividade: fato em 10/05/2026, conhecimento imediato — queixa dentro dos 6 meses (art. 38 do CPP).
• Teses: falsidade da imputação (dolo de caluniar); dano à honra objetiva.
• Pedidos: recebimento, citação, audiência, oitiva de testemunhas, procedência/condenação (art. 138 c/c 141, III, CP), custas.

ERROS FREQUENTES: oferecer 'denúncia' (peça do MP); esquecer a procuração com poderes especiais; endereçar à Vara Cível; classificar como difamação (a imputação é de FATO CRIMINOSO → calúnia).`},

{id:"resposta",nome:"Resposta à Acusação",disc:"Estágio I",
ficha:{cabimento:"Primeira peça de defesa após o recebimento da denúncia ou queixa e a citação do acusado, no procedimento comum (art. 396 do CPP).",prazo:"10 dias, contados da citação (art. 396 do CPP).",base:"Arts. 396, 396-A e 397 do CPP.",end:"Juízo criminal em que tramita a ação penal ('...Juiz de Direito da ... Vara Criminal de .../DF — Autos nº ...').",leg:"Acusado, por advogado constituído (procuração) ou defensor."},
estrutura:[
{t:"Endereçamento e preâmbulo",p:"Ao juízo do processo, com número dos autos. Indique o acusado já qualificado nos autos.",ex:"EXCELENTÍSSIMO SENHOR DOUTOR JUIZ DE DIREITO DA 2ª VARA CRIMINAL DE CEILÂNDIA/DF\nAutos nº ...\nFULANO, já qualificado nos autos, vem apresentar RESPOSTA À ACUSAÇÃO, nos termos dos arts. 396 e 396-A do CPP..."},
{t:"Síntese acusatória",p:"Resuma a imputação da denúncia (fato, tipo penal).",ex:""},
{t:"Preliminares",p:"Antes do mérito: inépcia da denúncia (art. 41), ausência de justa causa, nulidades (citação, incompetência), rejeição (art. 395 do CPP).",ex:""},
{t:"Mérito — absolvição sumária",p:"Teses do art. 397 do CPP: I) excludente de ilicitude; II) excludente de culpabilidade (salvo inimputabilidade); III) atipicidade; IV) extinção da punibilidade. Se não for caso de absolvição sumária, argumente o que será demonstrado na instrução.",ex:"A conduta é manifestamente atípica (princípio da insignificância), impondo-se a absolvição sumária, nos termos do art. 397, III, do CPP."},
{t:"Provas e testemunhas",p:"Requeira as provas e arrole testemunhas (até 8 no rito ordinário — art. 401 do CPP), sob pena de preclusão.",ex:""},
{t:"Pedidos",p:"Acolhimento das preliminares; absolvição sumária; subsidiariamente, produção de provas e oitiva das testemunhas arroladas.",ex:"a) o acolhimento da preliminar de inépcia, rejeitando-se a denúncia;\nb) subsidiariamente, a absolvição sumária, art. 397, III, do CPP;\nc) não sendo esse o entendimento, a produção de prova testemunhal, com a oitiva do rol abaixo."}],
caso:`PEDRO HENRIQUE DA SILVA, brasileiro, solteiro, auxiliar de serviços gerais desempregado, 22 anos, primário e de bons antecedentes, residente na QNL 5, bloco C, apartamento 202, Taguatinga/DF, foi denunciado pelo Ministério Público do Distrito Federal e Territórios como incurso no art. 155, caput, do Código Penal. Segundo a denúncia, em 3 de março de 2026, por volta das 18h30, no interior do Supermercado Preço Bom, situado em Taguatinga/DF, Pedro subtraiu, para si, um pacote de fraldas descartáveis e dois potes de leite em pó, avaliados, conforme auto de avaliação, em R$ 87,00 (oitenta e sete reais).

Consta do inquérito que Pedro foi abordado pelo fiscal de loja logo após passar pelos caixas sem efetuar o pagamento, tendo as mercadorias sido integralmente recuperadas, sem qualquer dano, e imediatamente devolvidas ao estabelecimento, conforme termo de restituição. Em sede policial, Pedro confessou a subtração e declarou que estava desempregado havia cinco meses e que os produtos se destinavam ao filho recém-nascido, o que foi corroborado pela certidão de nascimento da criança e por declaração da genitora. A folha de antecedentes não registra qualquer anotação.

A denúncia foi recebida em 15 de junho de 2026 pelo Juízo da 2ª Vara Criminal de Taguatinga/DF (autos nº 0712345-67.2026.8.07.0007). Pedro foi pessoalmente citado em 1º de julho de 2026 e, no mesmo dia, procurou o Núcleo de Prática Jurídica, apresentando cópia integral dos autos. Deseja arrolar como testemunhas sua vizinha, Maria das Graças Souza, e o líder comunitário Antônio Ferreira, que podem atestar sua situação de penúria à época dos fatos.

Considerando a fase procedimental e que ainda não foi praticado qualquer ato de defesa nos autos, na condição de advogado(a) de Pedro, redija a peça processual cabível — vedada a impetração de habeas corpus —, arguindo todas as teses de direito material e processual pertinentes, com os respectivos fundamentos legais, requerimentos de prova e pedidos. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Resposta à acusação (arts. 396 e 396-A do CPP) — prazo de 10 dias da citação.

TESES:
• PRINCIPAL: atipicidade material pelo princípio da insignificância (mínima ofensividade, ausência de periculosidade, reduzido grau de reprovabilidade, inexpressividade da lesão — STF, HC 84.412) → absolvição sumária, art. 397, III, do CPP.
• Subsidiárias: furto famélico/estado de necessidade (art. 24 do CP → art. 397, I); furto privilegiado (art. 155, §2º, do CP — primário + pequeno valor); arrependimento posterior (art. 16 do CP — restituição integral antes do recebimento).
• Arrolar testemunhas sob pena de preclusão.

PEDIDOS: absolvição sumária; subsidiariamente, provas e testemunhas; benefícios legais.

ERROS FREQUENTES: perder-se em matéria de prova (a peça não é alegações finais); esquecer o rol de testemunhas; não formular pedidos subsidiários.`},

{id:"alegacoes",nome:"Alegações Finais por Memoriais",disc:"Estágio I",
ficha:{cabimento:"Última manifestação da defesa antes da sentença, quando convertidos os debates orais em memoriais escritos (art. 403, §3º, do CPP) ou no rito do júri, na 1ª fase (art. 411, §4º — em regra orais). Momento de análise de TODA a prova produzida.",prazo:"5 dias (art. 403, §3º, do CPP).",base:"Art. 403, §3º, do CPP; teses absolutórias do art. 386 do CPP.",end:"Juízo criminal do processo, com número dos autos.",leg:"Acusado, por seu defensor."},
estrutura:[
{t:"Preâmbulo",p:"Identifique o processo e a fase (memoriais).",ex:"...vem apresentar ALEGAÇÕES FINAIS POR MEMORIAIS, nos termos do art. 403, §3º, do CPP."},
{t:"Síntese processual",p:"Resuma denúncia, instrução e provas produzidas (interrogatório, testemunhas, perícias).",ex:""},
{t:"Preliminares",p:"Nulidades ocorridas na instrução (cerceamento de defesa, prova ilícita — art. 5º, LVI, CF; art. 157 do CPP).",ex:""},
{t:"Mérito — teses absolutórias",p:"Fundamente na prova dos autos com as hipóteses do art. 386 do CPP (inexistência do fato, negativa de autoria, atipicidade, excludentes, insuficiência probatória — in dubio pro reo, inciso VII).",ex:"As testemunhas de acusação não presenciaram os fatos e o laudo é inconclusivo: impõe-se a absolvição por insuficiência de provas (art. 386, VII, do CPP)."},
{t:"Teses subsidiárias — dosimetria",p:"Desclassificação; participação de menor importância; pena-base no mínimo; atenuantes (confissão — art. 65, III, d); causas de diminuição; regime inicial mais brando; substituição por restritivas (art. 44 do CP); sursis; direito de recorrer em liberdade.",ex:""},
{t:"Pedidos",p:"Absolvição (indicando o inciso do art. 386); subsidiariamente, os pleitos de dosimetria em ordem lógica.",ex:""}],
caso:`LUCAS MENDES FERREIRA, brasileiro, solteiro, auxiliar administrativo, 24 anos, primário, residente em Samambaia/DF, foi denunciado como incurso no art. 157, §2º, II, do Código Penal, porque, segundo a denúncia, em 12 de fevereiro de 2026, por volta das 21h, em via pública de Samambaia/DF, em concurso com adolescente não identificado, mediante grave ameaça, teria subtraído o aparelho celular da vítima Josué Almeida. A denúncia foi recebida em 20 de março de 2026 pelo Juízo da Vara Criminal de Samambaia (autos nº 0723456-78.2026.8.07.0009), a resposta à acusação foi apresentada por defensor anterior e não houve absolvição sumária.

Na audiência de instrução e julgamento, realizada em 25 de junho de 2026, foram colhidas as seguintes provas: (i) a vítima Josué, ao ser instada a reconhecer o acusado presente na sala, declarou textualmente: "acho que era ele, mas estava escuro e tudo foi muito rápido", admitindo que o reconhecimento fotográfico na delegacia foi feito a partir de uma única foto exibida pelos policiais, sem observância de qualquer formalidade; (ii) o policial militar Sargento Ribeiro, única testemunha de acusação, relatou apenas que prendeu Lucas cerca de duas horas depois dos fatos, em local diverso, a dois quilômetros do roubo, sem que nada de ilícito fosse encontrado em seu poder — o celular jamais foi recuperado; (iii) as testemunhas de defesa, Pastor Elias Cardoso e a diácona Rute Moreira, afirmaram, de forma harmônica, que Lucas participava do culto na Igreja Batista local entre 19h30 e 22h da data dos fatos, como fazia todas as quartas-feiras; (iv) em interrogatório, Lucas negou os fatos e reiterou o álibi.

Encerrada a instrução, o juiz converteu os debates orais em memoriais escritos, nos termos do art. 403, §3º, do CPP. O Ministério Público apresentou seus memoriais pugnando pela condenação nos termos da denúncia. Os autos vieram com vista à defesa em 3 de julho de 2026.

Na condição de advogado(a) de Lucas, redija a peça processual cabível, com todas as teses defensivas principais e subsidiárias, devidamente fundamentadas. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Alegações finais por memoriais (art. 403, §3º, do CPP).

TESES:
• PRINCIPAL: absolvição por não existir prova suficiente da autoria — reconhecimento judicial frágil (inobservância do art. 226 do CPP), palavra isolada de policial sobre fato que não presenciou, álibi corroborado → art. 386, V e VII, do CPP (in dubio pro reo).
• Subsidiárias: afastamento da majorante do concurso (não comprovado o vínculo com o adolescente); desclassificação para furto se afastada a grave ameaça (conforme prova); pena-base no mínimo (primariedade); regime inicial mais brando; direito de recorrer em liberdade.

PEDIDOS: absolvição (art. 386, V ou VII, CPP); subsidiariamente, exclusão da majorante, pena mínima, regime aberto/semiaberto.

ERROS FREQUENTES: repetir a resposta à acusação sem analisar a PROVA produzida; esquecer as teses subsidiárias; não indicar o inciso do art. 386.`},
{id:"libprov",nome:"Pedido de Liberdade Provisória",disc:"Estágio I",
ficha:{cabimento:"Quando a prisão em flagrante é LEGAL, mas não estão presentes os requisitos da preventiva (art. 312 do CPP): o juiz deve conceder liberdade provisória, com ou sem fiança/medidas cautelares (art. 310, III, e arts. 321 e ss. do CPP).",prazo:"Não há prazo — cabível enquanto perdurar a prisão.",base:"Art. 5º, LXVI, da CF; arts. 310, III, 319 e 321 do CPP.",end:"Juiz competente que apreciou/apreciará o flagrante (ex.: Juiz do Núcleo de Audiência de Custódia ou da Vara Criminal).",leg:"Preso, por advogado (procuração) ou qualquer pessoa em seu favor."},
estrutura:[
{t:"Preâmbulo",p:"Identifique o preso e o auto de prisão em flagrante (APF).",ex:"...vem requerer LIBERDADE PROVISÓRIA, com fundamento no art. 5º, LXVI, da CF e arts. 310, III, e 321 do CPP..."},
{t:"Dos fatos",p:"Narre a prisão e a situação pessoal do preso (primariedade, residência fixa, trabalho lícito, família).",ex:""},
{t:"Do direito",p:"Reconheça a legalidade formal do flagrante, mas demonstre a AUSÊNCIA dos requisitos da preventiva (art. 312): não há risco à ordem pública, à instrução ou à aplicação da lei penal. Invoque presunção de inocência (art. 5º, LVII, CF) e a excepcionalidade da prisão (art. 282, §6º). Se o crime não admite preventiva (art. 313), reforce.",ex:"O requerente é primário, possui residência fixa e trabalho lícito; a prisão cautelar é a ultima ratio..."},
{t:"Medidas cautelares",p:"Demonstre que as medidas do art. 319 do CPP são suficientes e adequadas (comparecimento periódico, proibição de contato etc.).",ex:""},
{t:"Pedidos",p:"Concessão da liberdade provisória, sem fiança (ou com dispensa — art. 350, se hipossuficiente), com expedição de alvará de soltura; subsidiariamente, cautelares do art. 319.",ex:"a) a concessão de liberdade provisória, sem fiança, expedindo-se o alvará de soltura;\nb) subsidiariamente, a aplicação de medidas cautelares diversas da prisão (art. 319 do CPP)."}],
caso:`RAFAEL SOUZA LIMA, brasileiro, solteiro, entregador com contrato de trabalho registrado em CTPS, 25 anos, primário, sem qualquer anotação penal, residente com a mãe na Quadra 205, conjunto 8, casa 12, Recanto das Emas/DF, foi preso em flagrante em 28 de junho de 2026, às 22h15, por policiais militares em patrulhamento de rotina, quando portava, no bolso da jaqueta, 12 g (doze gramas) de maconha divididas em quatro porções e R$ 150,00 (cento e cinquenta reais) em notas trocadas. Foi autuado pela suposta prática do crime de tráfico de drogas (art. 33, caput, da Lei nº 11.343/2006).

O auto de prisão em flagrante encontra-se formalmente perfeito: presentes as testemunhas de apresentação, lavrado o auto pela autoridade competente, entregue a nota de culpa no prazo legal, comunicada a prisão ao juízo, ao Ministério Público e à família dentro de 24 horas, e elaborado o laudo preliminar de constatação da substância. Em depoimento, Rafael declarou que a droga se destinava a consumo próprio e de amigos em uma confraternização.

Na audiência de custódia, realizada em 29 de junho de 2026 no Núcleo de Audiência de Custódia de Brasília/DF, o Ministério Público requereu a conversão do flagrante em prisão preventiva, alegando, genericamente, que "a gravidade do crime de tráfico e a garantia da ordem pública recomendam a segregação cautelar". A defesa constituída não estava presente e o juiz plantonista determinou a conclusão dos autos para deliberação, encontrando-se Rafael, até o momento, custodiado.

A família de Rafael procurou o Núcleo de Prática Jurídica portando: CTPS com contrato ativo, comprovante de residência fixa, certidões negativas de antecedentes e declaração do empregador. Considerando que não há ilegalidade formal na prisão em flagrante e que ainda não foi decretada a prisão preventiva, na condição de advogado(a) de Rafael, redija a peça processual cabível perante o juízo de primeiro grau — vedada a impetração de habeas corpus —, enfrentando a manifestação ministerial e formulando todos os pedidos, inclusive subsidiários. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Pedido de liberdade provisória (art. 310, III, c/c art. 321 do CPP) — o flagrante é LEGAL, então NÃO cabe relaxamento.

TESES:
• Ausência dos requisitos do art. 312 do CPP — gravidade abstrata e alegação genérica de 'ordem pública' não fundamentam preventiva (STF/STJ).
• Condições pessoais favoráveis: primariedade, residência fixa, trabalho lícito.
• Tráfico privilegiado (art. 33, §4º, Lei 11.343/06) em perspectiva: pena provável baixa, possível regime aberto — desproporcionalidade da prisão cautelar (art. 282, §6º, CPP; homogeneidade das cautelares).
• Suficiência das medidas do art. 319 do CPP.

PEDIDOS: liberdade provisória sem fiança com alvará de soltura; subsidiariamente, cautelares diversas.

ERROS FREQUENTES: pedir relaxamento (flagrante é legal); pedir HC ao tribunal (a competência é do juiz de 1º grau); não impugnar a fundamentação genérica do art. 312.`},

{id:"relax",nome:"Relaxamento de Prisão em Flagrante",disc:"Estágio I",
ficha:{cabimento:"Quando a prisão é ILEGAL — vício formal ou material no flagrante (fora das hipóteses do art. 302 do CPP, inobservância de formalidades dos arts. 304-306, excesso de prazo etc.). A autoridade judiciária deve relaxá-la imediatamente.",prazo:"Não há — enquanto durar a ilegalidade.",base:"Art. 5º, LXV, da CF; art. 310, I, do CPP.",end:"Juiz competente para apreciar o flagrante (custódia ou vara criminal).",leg:"Preso, por advogado, ou qualquer pessoa."},
estrutura:[
{t:"Preâmbulo",p:"Identificação do preso e do APF, com fundamento no art. 5º, LXV, da CF.",ex:"...vem requerer o RELAXAMENTO DA PRISÃO EM FLAGRANTE, nos termos do art. 5º, LXV, da CF e do art. 310, I, do CPP..."},
{t:"Dos fatos",p:"Narre a prisão destacando o vício (quando, onde, como).",ex:""},
{t:"Do direito — ilegalidade",p:"Demonstre a ilegalidade: ausência de situação flagrancial (art. 302), flagrante preparado (Súmula 145/STF), inobservância de formalidades (nota de culpa, comunicação em 24h — art. 306, audiência de custódia), violação de domicílio sem fundadas razões (art. 5º, XI, CF; STF RE 603.616).",ex:"O requerente foi preso 3 dias após os fatos, sem situação de flagrância (art. 302 do CPP) e sem mandado judicial: prisão manifestamente ilegal."},
{t:"Pedidos",p:"Relaxamento da prisão com expedição de alvará de soltura; subsidiariamente, liberdade provisória (art. 310, III) ou cautelares.",ex:"a) o RELAXAMENTO da prisão em flagrante, com a imediata expedição de alvará de soltura;\nb) subsidiariamente, a concessão de liberdade provisória, com ou sem cautelares do art. 319 do CPP."}],
caso:`CARLOS EDUARDO RAMOS, brasileiro, solteiro, mecânico, 30 anos, residente na Quadra 2, conjunto A, casa 7, Planaltina/DF, foi preso em flagrante no dia 25 de junho de 2026, às 23h, no interior de sua residência, pela suposta prática do crime de tráfico de drogas (art. 33, caput, da Lei nº 11.343/2006).

Consta do auto de prisão em flagrante que, naquela noite, a equipe de policiais militares recebeu, via COPOM, denúncia anônima de que "um homem conhecido como Cadu guardaria drogas em casa". Sem qualquer diligência prévia de averiguação, sem monitoramento, sem mandado judicial e sem que houvesse qualquer situação visível de flagrância — a casa estava fechada e silenciosa —, os policiais pularam o muro da residência, arrombaram a porta dos fundos e, no guarda-roupa do quarto, localizaram 30 g de cocaína. Não havia consentimento válido do morador: a esposa de Carlos, única presente no momento do ingresso, declarou em depoimento que os policiais já estavam dentro de casa quando se identificaram.

Além disso, verificou-se dos autos que: (i) a nota de culpa somente foi entregue a Carlos três dias após a lavratura do auto; (ii) a comunicação da prisão ao juízo competente ocorreu 48 horas após a captura; e (iii) a audiência de custódia ainda não foi designada, passados oito dias, encontrando-se o auto de prisão em flagrante concluso ao Juízo da Vara Criminal de Planaltina/DF.

A família procurou o Núcleo de Prática Jurídica em 3 de julho de 2026. Na condição de advogado(a) de Carlos, redija a peça processual cabível perante o juízo de primeiro grau — vedada a impetração de habeas corpus —, demonstrando fundamentadamente todas as ilegalidades da prisão e suas consequências sobre a prova, com os pedidos principais e subsidiários pertinentes. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Relaxamento de prisão em flagrante (art. 5º, LXV, CF; art. 310, I, CPP) — prisão ILEGAL.

TESES:
• Violação de domicílio: denúncia anônima, isolada, não constitui fundadas razões para ingresso sem mandado (art. 5º, XI, CF; STF RE 603.616; STJ HC 598.051) → ilicitude da prova obtida (art. 5º, LVI, CF; art. 157 CPP) e ilegalidade do flagrante.
• Vícios formais: nota de culpa fora do prazo de 24h e comunicação tardia ao juiz (art. 306, §§1º e 2º, CPP).
• Consequência: desentranhamento das provas ilícitas e derivadas.

PEDIDOS: relaxamento com alvará de soltura; desentranhamento das provas ilícitas; subsidiariamente, liberdade provisória/cautelares.

ERROS FREQUENTES: confundir com liberdade provisória (aqui a prisão é ILEGAL); esquecer o pedido subsidiário; não atacar a prova ilícita.`},

ficha:{cabimento:"Quando a preventiva foi decretada, mas os motivos que a justificaram desapareceram ou nunca existiram (art. 316 do CPP). Também para prisão temporária vencida ou sem fundamento.",prazo:"Não há — a qualquer tempo; o juiz deve revisar a necessidade a cada 90 dias (art. 316, parágrafo único).",base:"Arts. 312, 313, 315 e 316 do CPP; art. 282, §6º, do CPP.",end:"Juízo que decretou a prisão (1º grau).",leg:"Preso, por advogado."},
estrutura:[
{t:"Preâmbulo",p:"Identifique o processo e a decisão que decretou a preventiva.",ex:"...vem requerer a REVOGAÇÃO DA PRISÃO PREVENTIVA, com fundamento no art. 316 do CPP..."},
{t:"Dos fatos",p:"Narre a decretação e o que mudou (fato novo) ou por que a decisão carece de fundamento.",ex:""},
{t:"Do direito",p:"Ausência/superação dos requisitos do art. 312; falta de contemporaneidade; fundamentação genérica (art. 315, §2º); condições pessoais; excesso de prazo da instrução; ultima ratio e cautelares (arts. 282 e 319).",ex:"Encerrada a instrução e ouvidas todas as testemunhas, não subsiste risco à instrução criminal — desapareceu o fundamento da custódia (art. 316 do CPP)."},
{t:"Pedidos",p:"Revogação da preventiva com alvará de soltura; subsidiariamente, substituição por cautelares (art. 319) ou domiciliar (art. 318, se cabível).",ex:""}],
caso:`ANDRÉ LUIZ CAMPOS, brasileiro, casado, corretor de imóveis, 62 anos, primário, hipertenso e diabético (conforme laudos médicos), residente há 20 anos em Sobradinho/DF, único responsável pelo sustento e pelos cuidados da esposa, diagnosticada com doença de Alzheimer em estágio moderado (atestado médico e laudo juntados), responde a ação penal pela suposta prática do crime de estelionato (art. 171, caput, do CP), em trâmite na 1ª Vara Criminal de Sobradinho/DF (autos nº 0734567-89.2026.8.07.0006).

Em 5 de fevereiro de 2026, o juízo decretou sua prisão preventiva, a requerimento do Ministério Público, sob o único fundamento de "risco à instrução criminal, pois o acusado, em liberdade, poderia influenciar as testemunhas arroladas pela acusação, todas vítimas dos supostos golpes". André encontra-se preso desde então — há cinco meses.

Em 30 de junho de 2026 realizou-se a audiência de instrução e julgamento: foram ouvidas TODAS as seis testemunhas de acusação e as três de defesa, e o réu foi interrogado. Ao final, o juízo declarou encerrada a instrução e abriu prazo para diligências do art. 402 do CPP, nada sendo requerido. Não há notícia de qualquer tentativa de contato de André com testemunhas ao longo do processo. Pedido de liberdade anterior, formulado em abril, foi indeferido "por persistirem os motivos da custódia" — decisão contra a qual não foi interposto qualquer recurso.

O crime imputado foi cometido sem violência ou grave ameaça e a pena mínima é de 1 ano de reclusão. Na condição de advogado(a) de André, redija a peça processual cabível perante o próprio juízo de primeiro grau — vedadas a impetração de habeas corpus e a interposição de recurso —, demonstrando a alteração do quadro fático-processual e formulando todos os pedidos, inclusive subsidiários. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Pedido de revogação de prisão preventiva (art. 316 do CPP).

TESES:
• Fato novo: instrução encerrada — não subsiste o único fundamento da custódia (influência em testemunhas); ausência de contemporaneidade dos requisitos do art. 312.
• Estelionato sem violência: pena provável e possibilidade de regime não fechado → desproporcionalidade (homogeneidade; art. 282, §6º).
• Condições pessoais: primário, 62 anos, saúde debilitada, residência fixa.
• Subsidiária: prisão domiciliar (art. 318, II — extrema debilidade por doença, conforme prova) ou cautelares do art. 319.

PEDIDOS: revogação com alvará de soltura; subsidiariamente domiciliar/cautelares.

ERROS FREQUENTES: repetir o pedido anterior sem apontar FATO NOVO; esquecer as subsidiárias; confundir com relaxamento (a preventiva foi formalmente válida — o fundamento é a superveniente desnecessidade). OBS.: se houver ilegalidade flagrante e urgência, discuta com a turma o cabimento paralelo de HC.`},
{id:"apelacao",nome:"Apelação Criminal",disc:"Estágio II",
ficha:{cabimento:"Contra sentença definitiva de condenação ou absolvição, e decisões definitivas ou com força de definitiva não atacáveis por RESE (art. 593, I a III, do CPP). No Júri, hipóteses restritas do art. 593, III.",prazo:"5 dias para INTERPOR (art. 593); 8 dias para as RAZÕES (art. 600). No JECRIM: 10 dias, petição única com razões (art. 82, §1º, Lei 9.099/95).",base:"Arts. 593 a 603 do CPP; art. 82 da Lei 9.099/95.",end:"INTERPOSIÇÃO dirigida ao juízo a quo (que proferiu a sentença); RAZÕES dirigidas ao tribunal ad quem (TJDFT: 'Egrégio Tribunal de Justiça do Distrito Federal e dos Territórios — Colenda Turma Criminal').",leg:"Réu (ou MP, querelante, assistente). Duas peças: petição de interposição + razões de apelação."},
estrutura:[
{t:"Petição de interposição",p:"Peça curta ao juízo a quo: manifesta a irresignação, requer o recebimento e a remessa ao tribunal, informa que as razões seguem anexas (ou serão apresentadas na superior instância — art. 600, §4º).",ex:"EXCELENTÍSSIMO SENHOR DOUTOR JUIZ DE DIREITO DA ... VARA CRIMINAL DE .../DF\nAutos nº...\nFULANO, já qualificado, inconformado com a r. sentença, vem interpor RECURSO DE APELAÇÃO, com fundamento no art. 593, I, do CPP, requerendo o recebimento e a remessa ao Eg. TJDFT, com as inclusas razões."},
{t:"Razões — endereçamento e síntese",p:"Ao tribunal. Qualifique apelante/apelado, resuma o processo e a sentença.",ex:"EGRÉGIO TRIBUNAL DE JUSTIÇA DO DISTRITO FEDERAL E DOS TERRITÓRIOS\nCOLENDA TURMA CRIMINAL\nRazões de apelação\nApelante: ... Apelado: Ministério Público..."},
{t:"Preliminares",p:"Nulidades da sentença ou da instrução (art. 564 do CPP), cerceamento de defesa, incompetência.",ex:""},
{t:"Mérito",p:"Reforma da sentença: absolvição (art. 386), desclassificação, ou redução da pena (dosimetria em 3 fases — art. 68 do CP), regime, substituição (art. 44), detração.",ex:""},
{t:"Pedidos",p:"Conhecimento e provimento; absolvição ou, subsidiariamente, cada pleito de dosimetria, em ordem.",ex:"a) o conhecimento e provimento do recurso para absolver o apelante (art. 386, VII, CPP);\nb) subsidiariamente, a redução da pena-base ao mínimo legal, a fixação do regime aberto e a substituição da pena (art. 44 do CP)."}],
caso:`FERNANDO COSTA ARAÚJO, brasileiro, solteiro, vendedor, 26 anos, primário, foi condenado pelo Juízo da 1ª Vara Criminal de Brasília/DF (autos nº 0745678-90.2025.8.07.0001) à pena de 6 (seis) anos de reclusão, em regime inicial fechado, e 15 dias-multa, como incurso no art. 157, §2º, II, do Código Penal, pela subtração de um aparelho celular avaliado em R$ 1.200,00.

Na sentença, publicada em 22 de junho de 2026, o magistrado assim decidiu: (i) na primeira fase da dosimetria, fixou a pena-base em 5 (cinco) anos — um ano acima do mínimo legal — com a seguinte fundamentação: "as circunstâncias judiciais são desfavoráveis, pois o crime de roubo é grave e assola a sociedade, gerando insegurança generalizada"; (ii) na segunda fase, reconheceu expressamente na fundamentação que "o réu confessou a subtração em juízo, confissão que serviu de esteio ao decreto condenatório", mas NÃO aplicou a atenuante correspondente, sem qualquer justificativa; (iii) na terceira fase, aplicou a majorante do concurso de pessoas (fração de 1/3), fundada exclusivamente na declaração da vítima de que "parecia haver outro rapaz olhando de longe, mas não tenho certeza" — nenhuma outra prova indicou a participação de terceiro; (iv) fixou o regime inicial fechado "em razão da gravidade do delito" e negou o direito de recorrer em liberdade, mantendo a prisão preventiva decretada na sentença sem indicação de fato concreto.

Em seu interrogatório, Fernando confessara a subtração, negando, porém, o concurso de agentes e o emprego de qualquer arma. A defesa foi intimada da sentença em 1º de julho de 2026. O Ministério Público não recorreu.

Na condição de advogado(a) de Fernando, redija a(s) peça(s) processual(is) cabível(is), com observância dos prazos e endereçamentos corretos, impugnando fundamentadamente todos os pontos da sentença desfavoráveis ao réu. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Apelação (art. 593, I, CPP) — interposição ao juízo a quo em 5 dias + razões ao TJDFT em 8 dias.

TESES:
• Afastamento da majorante do concurso de pessoas: prova frágil e dúvida ("parecia haver") → in dubio pro reo.
• Dosimetria: pena-base no mínimo — gravidade abstrata do tipo não justifica exasperação (fundamentação inidônea, art. 93, IX, CF; Súmulas do STJ).
• Atenuante da confissão espontânea (art. 65, III, d, CP) — Súmula 545/STJ: se usada na condenação, DEVE atenuar.
• Consequências: pena reduzida → regime inicial mais brando (art. 33, §2º); recorrer em liberdade se cabível.

PEDIDOS: provimento para afastar a majorante, reduzir a pena-base ao mínimo, aplicar a atenuante da confissão, abrandar o regime.

ERROS FREQUENTES: peça única endereçada só ao tribunal (são DUAS peças); confundir prazos (5 + 8); pedir 'reforma' genérica sem enfrentar a dosimetria fase a fase.`},

{id:"rese",nome:"Recurso em Sentido Estrito (RESE)",disc:"Estágio II",
ficha:{cabimento:"Contra as decisões TAXATIVAMENTE previstas no art. 581 do CPP: ex.: rejeição da denúncia/queixa (I), incompetência (II), pronúncia (IV), concessão/negação de liberdade provisória (V), extinção da punibilidade (VIII e IX), entre outras.",prazo:"5 dias para interpor (art. 586); 2 dias para as razões (art. 588).",base:"Arts. 581 a 592 do CPP.",end:"Interposição ao juízo a quo; razões ao tribunal. Há JUÍZO DE RETRATAÇÃO (art. 589).",leg:"Parte prejudicada pela decisão."},
estrutura:[
{t:"Petição de interposição",p:"Ao juízo a quo, indicando o inciso do art. 581. Requeira a retratação (art. 589) e, não havendo, a remessa ao tribunal.",ex:"...vem interpor RECURSO EM SENTIDO ESTRITO, com fundamento no art. 581, IV, do CPP, requerendo o juízo de retratação (art. 589) e, mantida a decisão, a remessa das inclusas razões ao Eg. TJDFT."},

{t:"Mérito",p:"Conforme a hipótese. Na pronúncia: impronúncia (art. 414 — ausência de indícios), absolvição sumária (art. 415), desclassificação (art. 419), exclusão de qualificadora manifestamente improcedente.",ex:""},
{t:"Pedidos",p:"Retratação; conhecimento e provimento; pedido específico da hipótese (ex.: despronúncia; exclusão de qualificadora).",ex:""}],
caso:`JOSÉ RICARDO MOREIRA, brasileiro, casado, pedreiro, 35 anos, primário, responde a processo perante a Vara do Tribunal do Júri de Ceilândia/DF (autos nº 0756789-01.2025.8.07.0003), acusado da suposta prática de homicídio qualificado por motivo fútil (art. 121, §2º, II, do CP) contra a vítima Ronaldo Dias, morta a facadas em um bar de Ceilândia em 10 de outubro de 2025.

Encerrada a primeira fase do procedimento do júri, sobreveio decisão de pronúncia, publicada em 22 de junho de 2026, com o seguinte teor essencial: "A materialidade está comprovada pelo laudo necroscópico. Quanto aos indícios de autoria, embora nenhuma das cinco testemunhas ouvidas em juízo tenha presenciado os fatos ou confirmado a presença do acusado no local, a testemunha Silvano Costa declarou, na fase inquisitorial, ter 'ouvido comentários no bairro' de que o autor das facadas teria sido José Ricardo — declaração não confirmada em juízo, pois a testemunha faleceu antes da instrução. Tal elemento, aliado à antiga rivalidade entre acusado e vítima, autoriza a pronúncia. Quanto à qualificadora do motivo fútil, sua análise compete exclusivamente aos jurados, juízes naturais da causa, razão pela qual a mantenho sem maiores considerações."

Em juízo, José Ricardo negou a autoria e apresentou álibi (estava em obra na cidade vizinha, conforme testemunhas ouvidas). Nenhuma prova produzida sob contraditório judicial vincula o acusado ao crime. A defesa foi intimada da decisão de pronúncia em 26 de junho de 2026.

Na condição de advogado(a) de José Ricardo, redija a peça processual cabível — vedado o habeas corpus —, com o endereçamento e o procedimento recursal corretos, impugnando a decisão em todos os seus pontos, com pedidos principais e subsidiários. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: RESE (art. 581, IV, do CPP) contra a pronúncia — interposição em 5 dias, razões em 2 dias, com pedido de retratação (art. 589).

TESES:
• Impronúncia (art. 414 do CPP): pronúncia não pode se fundar exclusivamente em testemunho indireto ('hearsay') colhido no inquérito e não confirmado em juízo (art. 155 do CPP; jurisprudência do STJ).
• Subsidiária: exclusão da qualificadora do motivo fútil — manifestamente improcedente, sem base concreta; excesso de linguagem, se houver.
• Cuidado com o in dubio pro societate: enfrentar mostrando ausência de lastro probatório MÍNIMO.

PEDIDOS: retratação; provimento para impronunciar; subsidiariamente, decotar a qualificadora.

ERROS FREQUENTES: interpor apelação (contra pronúncia cabe RESE); esquecer a retratação; pedir 'absolvição' pura (na fase da pronúncia, o pedido técnico é impronúncia ou absolvição sumária do art. 415).`},

caso:`MARINA OLIVEIRA SANTOS, brasileira, solteira, cabeleireira, 28 anos, primária, foi denunciada pela suposta prática do crime de tráfico de drogas (art. 33, caput, da Lei nº 11.343/2006) perante a 2ª Vara de Entorpecentes do Distrito Federal (autos nº 0767890-12.2025.8.07.0015).

Ao final da instrução, sobreveio sentença ABSOLUTÓRIA, com fundamento no art. 386, II, do CPP, assim fundamentada em essência: "O ingresso dos policiais na residência da acusada deu-se sem mandado judicial, sem consentimento e sem fundadas razões prévias que indicassem situação de flagrância: a diligência baseou-se exclusivamente em denúncia anônima recebida naquela mesma tarde, sem qualquer averiguação preliminar, campana ou investigação. Nos termos do decidido pelo STF no RE 603.616 (Tema 280) e pelo STJ no HC 598.051, a prova obtida é ilícita, contaminando todas as demais dela derivadas (art. 5º, LVI, da CF e art. 157 do CPP). Sem prova lícita, impõe-se a absolvição."

O Ministério Público interpôs recurso de apelação. Em suas razões, sustenta exclusivamente que: (i) o crime de tráfico, na modalidade "ter em depósito", é permanente, de modo que o estado de flagrância se protrai no tempo e autorizaria o ingresso domiciliar a qualquer momento, independentemente de mandado; e (ii) a denúncia anônima, por ter se confirmado a posteriori com a apreensão da droga, seria suficiente para legitimar a diligência. Pugna pela condenação de Marina nas penas do art. 33 da Lei de Drogas.

A defesa foi intimada em 30 de junho de 2026 para apresentar a resposta ao recurso. Na condição de advogado(a) de Marina, redija a peça processual cabível, rebatendo especificamente cada tese ministerial e requerendo o que for de direito. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Contrarrazões de apelação (art. 600 do CPP) — 8 dias.

TESES:
• A permanência do crime NÃO dispensa fundadas razões prévias e concretas para o ingresso domiciliar (STF RE 603.616, Tema 280; STJ HC 598.051): denúncia anônima isolada não basta.
• Prova ilícita e derivadas (art. 5º, LVI, CF; art. 157 CPP) → correta a absolvição (art. 386, II, CPP).
• Manutenção da sentença por seus próprios fundamentos.

PEDIDOS: desprovimento do recurso ministerial, mantendo-se integralmente a r. sentença absolutória.

ERROS FREQUENTES: 'apelar' em vez de contrarrazoar; deixar de rebater especificamente a tese do apelante; inovar pedindo algo além da manutenção da sentença.`},

caso:`TIAGO ALMEIDA ROCHA, brasileiro, solteiro, estoquista, 23 anos, primário, foi condenado pelo Juízo da 3ª Vara Criminal de Brasília/DF (autos nº 0778901-23.2025.8.07.0001) pela prática de furto qualificado pelo concurso de agentes (art. 155, §4º, IV, do CP), à pena de 2 (dois) anos e 6 (seis) meses de reclusão, em regime inicial aberto, e 12 dias-multa.

A sentença, na fundamentação, consignou textualmente: "O réu confessou espontaneamente os fatos, tanto na fase policial quanto em juízo, e sua confissão foi decisiva para o decreto condenatório, na medida em que os demais elementos de prova eram frágeis. Por essa razão, a pena DEVE ser atenuada na segunda fase da dosimetria, em homenagem à Súmula 545 do STJ." No dispositivo, contudo, o magistrado fixou a pena-base em 2 anos e 2 meses e, na segunda fase, limitou-se a registrar: "ausentes agravantes e atenuantes", estabelecendo a pena definitiva em 2 anos e 6 meses após a exasperação pela qualificadora — sem aplicar a anunciada atenuante e sem qualquer explicação para a discrepância.

Além disso, nas alegações finais a defesa havia requerido expressamente a substituição da pena privativa de liberdade por duas restritivas de direitos (art. 44 do CP), destacando o preenchimento de todos os requisitos legais. A sentença, porém, nada disse sobre o pedido — nem para deferi-lo, nem para indeferi-lo.

A defesa foi intimada da sentença em 3 de julho de 2026 (quinta-feira). Considerando a existência de vícios internos da decisão e a conveniência de saná-los perante o próprio juízo prolator antes de eventual recurso, na condição de advogado(a) de Tiago, redija a peça processual cabível — vedada a apelação —, apontando com precisão cada vício e requerendo os efeitos pertinentes. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Embargos de declaração (art. 382 do CPP) — 2 dias, ao próprio juízo sentenciante.

VÍCIOS:
• CONTRADIÇÃO: fundamentação reconhece a confissão e anuncia atenuação; dispositivo não atenua.
• OMISSÃO: ausência de exame do pedido de substituição da pena (art. 44 do CP).

TESES: sanar os vícios com EFEITOS INFRINGENTES — aplicar a atenuante (art. 65, III, d, CP; Súmula 545/STJ) e apreciar a substituição. Destacar a interrupção do prazo para a apelação.

PEDIDOS: acolhimento para suprir a omissão e eliminar a contradição, com efeitos modificativos.

ERROS FREQUENTES: apelar diretamente (perde a via rápida dos embargos — embora a apelação também pudesse veicular as teses, o exercício pede embargos); dirigir ao tribunal (é ao prolator); perder o prazo exíguo de 2 dias.`},

caso:`BRUNO DE JESUS ZEBA, brasileiro, solteiro, motoboy, 27 anos, primário, foi condenado pelo Juízo da 2ª Vara Criminal de Brasília/DF à pena de 1 ano e 4 meses de reclusão, em regime aberto, pela prática do crime de receptação (art. 180, caput, do CP), por ter adquirido, supostamente ciente da origem ilícita, uma motocicleta produto de furto.

A defesa apelou. A 2ª Turma Criminal do TJDFT, em sessão de 18 de junho de 2026, NEGOU PROVIMENTO ao recurso, por maioria de votos (2x1), mantendo integralmente a condenação (Apelação Criminal nº 0720958-30.2025.8.07.0001). O Desembargador relator e o vogal entenderam que a desproporção entre o preço pago e o valor de mercado indicaria a ciência da origem criminosa. VENCIDO o Desembargador revisor, que DAVA PROVIMENTO à apelação para ABSOLVER o apelante por insuficiência de prova do dolo, nos termos do art. 386, VII, do CPP, sob os seguintes fundamentos: (i) Bruno adquiriu a motocicleta mediante recibo escrito, de vendedor identificado, com entrega de documento (ainda que posteriormente constatado como adulterado, sem prova de que o acusado soubesse); (ii) o preço pago era compatível com o estado de conservação do bem; (iii) o acusado usava a motocicleta ostensivamente para trabalhar, comportamento incompatível com a ciência da origem ilícita; (iv) a dúvida razoável sobre o elemento subjetivo impõe a absolvição.

O acórdão foi publicado no DJe em 24 de junho de 2026 e não houve interposição de recurso pelo Ministério Público. A defesa pretende explorar a divergência instaurada no julgamento.

Na condição de advogado(a) de Bruno, redija a peça processual cabível — vedados o recurso especial, o recurso extraordinário e a revisão criminal —, observando o cabimento restrito da via eleita, seu endereçamento e a delimitação do seu objeto. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Embargos infringentes (art. 609, parágrafo único, do CPP) — 10 dias, ao relator no TJDFT.

PONTOS ESSENCIAIS:
• Cabimento: acórdão não unânime (2x1) desfavorável ao réu em apelação; recurso EXCLUSIVO da defesa.
• Objeto LIMITADO à divergência: ausência de prova do dolo (elemento subjetivo da receptação — art. 180 do CP: 'coisa que sabe ser produto de crime').
• Desenvolvimento: fragilidade probatória; boa-fé (aquisição com documento, preço de mercado, conforme o caso); in dubio pro reo (art. 386, VII, CPP).

PEDIDOS: acolhimento dos embargos para que prevaleça o voto vencido, absolvendo-se o embargante.

ERROS FREQUENTES: opor contra acórdão unânime; extrapolar a divergência; confundir com embargos de declaração.`},

{t:"Pedidos",p:"Retratação; provimento para reformar a decisão (ex.: deferir a progressão).",ex:""}],
caso:`VALDIR ROCHA MENDES, brasileiro, casado, serralheiro, 41 anos, cumpre pena de 12 anos de reclusão, em regime fechado, imposta por condenação definitiva por roubo majorado, na Penitenciária do Distrito Federal (Execução Penal nº 0789012-34.2020.8.07.0015, em trâmite na Vara de Execuções Penais do DF). É reincidente em crime cometido com violência.

Em 10 de maio de 2026, a defesa requereu: (i) a progressão ao regime semiaberto, demonstrando o preenchimento do requisito objetivo — cumprimento da fração legal exigida pelo art. 112 da LEP para sua situação, conforme atestado de pena a cumprir emitido pela própria VEP — e do requisito subjetivo, mediante atestado de boa conduta carcerária firmado pelo diretor do estabelecimento, sem registro de qualquer falta disciplinar nos últimos cinco anos; e (ii) a declaração da remição de 90 dias de pena pelos 270 dias efetivamente trabalhados na cozinha do presídio, comprovados por planilha oficial da direção da unidade juntada aos autos.

Em 25 de junho de 2026, o Juízo da VEP proferiu a seguinte decisão: "1. INDEFIRO a progressão de regime. Embora presentes os requisitos objetivo e subjetivo, a gravidade abstrata do crime de roubo, praticado com arma, recomenda cautela e maior rigor no tratamento do apenado, sendo prematura a colocação em regime menos rigoroso. 2. INDEFIRO igualmente a remição, por ausência de comprovação idônea dos dias trabalhados." A decisão não determinou a realização de exame criminológico nem apontou qualquer fato concreto desabonador. A defesa foi intimada em 29 de junho de 2026.

Na condição de advogado(a) de Valdir, redija a peça processual cabível contra a decisão, observando prazo, rito e endereçamento próprios, e impugnando fundamentadamente os dois capítulos do decisum. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Agravo em execução (art. 197 da LEP) — 5 dias (Súmula 700/STF), rito do RESE.

TESES:
• Progressão: preenchidos os requisitos objetivo (lapso do art. 112 da LEP) e subjetivo (atestado de conduta); gravidade abstrata do delito NÃO é fundamento idôneo para indeferir (Súmula 439/STJ — exame criminológico exige decisão fundamentada em elementos concretos; art. 112, §1º).
• Remição: 1 dia de pena a cada 3 de trabalho (art. 126, §1º, II, LEP); prova documental oficial nos autos.

PEDIDOS: retratação; provimento para deferir a progressão ao semiaberto e declarar a remição de 90 dias.

ERROS FREQUENTES: usar apelação ou RESE; endereçar razões à VEP; esquecer a Súmula 700 (prazo de 5 dias).`},

{id:"hc",nome:"Habeas Corpus",disc:"Estágio II",
ficha:{cabimento:"Sempre que alguém sofrer ou se achar ameaçado de sofrer violência ou coação em sua LIBERDADE DE LOCOMOÇÃO, por ilegalidade ou abuso de poder (art. 5º, LXVIII, CF; art. 647 do CPP). Hipóteses do art. 648 do CPP. Preventivo (salvo-conduto) ou liberatório.",prazo:"Não há prazo.",base:"Art. 5º, LXVIII, da CF; arts. 647 a 667 do CPP.",end:"Depende da AUTORIDADE COATORA: Delegado/particular → Juiz de 1º grau; Juiz de 1º grau/Turma Recursal → TJDFT (ou TRF); Tribunal → STJ; STJ → STF (art. 102, I, i; art. 105, I, c, CF).",leg:"QUALQUER PESSOA pode impetrar (não exige advogado). Impetrante ≠ paciente ≠ autoridade coatora."},
estrutura:[
{t:"Endereçamento",p:"Identifique a autoridade coatora e suba um degrau na jurisdição.",ex:"EGRÉGIO TRIBUNAL DE JUSTIÇA DO DISTRITO FEDERAL E DOS TERRITÓRIOS (coator: Juiz de Direito de 1º grau)"},
{t:"Preâmbulo",p:"Impetrante (quem assina), paciente (quem sofre a coação) e autoridade coatora.",ex:"FULANO, advogado..., vem impetrar ordem de HABEAS CORPUS, com pedido liminar, em favor de BELTRANO (paciente), apontando como autoridade coatora o MM. Juiz de Direito da ... Vara Criminal de .../DF."},
{t:"Dos fatos e do constrangimento ilegal",p:"Narre a coação e enquadre no art. 648 (falta de justa causa, excesso de prazo, incompetência, extinção da punibilidade, nulidade etc.). Lembre: HC não admite dilação probatória — prova pré-constituída.",ex:""},
{t:"Da liminar",p:"Demonstre fumus boni iuris e periculum in mora para a concessão liminar (soltura ou salvo-conduto imediato).",ex:""},
{t:"Pedidos",p:"Liminar; informações da autoridade coatora; parecer do MP; concessão definitiva da ordem (com alvará de soltura/salvo-conduto).",ex:"a) a concessão LIMINAR da ordem, expedindo-se alvará de soltura;\nb) a requisição de informações à autoridade coatora;\nc) no mérito, a concessão definitiva da ordem."}],
caso:`HELENA MARTINS COSTA, brasileira, solteira, manicure, 29 anos, primária, de bons antecedentes, mãe de uma criança de 4 anos que atualmente está sob os cuidados precários de uma vizinha, encontra-se presa preventivamente há 9 (nove) meses, por suposta participação em associação criminosa (art. 2º da Lei nº 12.850/2013), por força de decisão do Juízo da 3ª Vara Criminal de Brasília/DF (autos nº 0790123-45.2025.8.07.0001).

A instrução processual está paralisada há 5 (cinco) meses sem a prática de qualquer ato: a audiência de instrução foi designada e remarcada TRÊS vezes — em fevereiro, abril e junho de 2026 — sempre por problemas de pauta do próprio juízo, jamais por qualquer contribuição da defesa, conforme certidões cartorárias. Não há data designada para nova audiência.

A defesa requereu a revogação da prisão diretamente ao juízo processante, que indeferiu o pedido em 26 de junho de 2026, com a seguinte fundamentação: "o feito segue em regular andamento, sendo os adiamentos justificados pela sobrecarga de pauta; permanecem os fundamentos da preventiva". Contra essa decisão não cabe, na espécie, recurso com efeito suspensivo capaz de fazer cessar de imediato o constrangimento.

Todos os corréus com situação idêntica já foram postos em liberdade. Helena tem residência fixa, ocupação lícita comprovada e nenhuma anotação penal. A documentação está pré-constituída: cópia integral dos autos, certidões dos adiamentos, certidão de nascimento da criança e comprovantes de residência e trabalho.

Na condição de advogado(a) de Helena, redija a peça cabível para fazer cessar imediatamente o constrangimento ilegal, com o endereçamento correto, a correta identificação de impetrante, paciente e autoridade coatora, pedido liminar fundamentado e pedidos definitivos, inclusive subsidiários. (Valor: 5,00)`,
gab:`PEÇA CABÍVEL: Habeas corpus liberatório, com pedido liminar, ao TJDFT (autoridade coatora: Juiz da 3ª Vara Criminal de Brasília).

TESES:
• Excesso de prazo na formação da culpa (art. 648, II, do CPP): 9 meses de prisão, instrução paralisada por 5 por falhas do juízo — desídia estatal não pode prejudicar a ré (razoável duração do processo, art. 5º, LXXVIII, CF).
• Ausência de contemporaneidade dos fundamentos da preventiva; condições pessoais favoráveis.
• Subsidiária: prisão domiciliar (art. 318, V, CPP — mãe de criança até 12 anos; HC coletivo 143.641/STF) ou cautelares do art. 319.

PEDIDOS: liminar para soltura; informações; concessão definitiva da ordem.

ERROS FREQUENTES: endereçar ao próprio juiz coator; confundir impetrante/paciente/coator; usar HC para matéria que exige prova (dilação probatória é vedada).`},

let store={};
function sget(k,d){try{return localStorage.getItem(k)??d}catch(e){return store[k]??d}}
function sset(k,v){try{localStorage.setItem(k,v)}catch(e){store[k]=v}}

const menu=document.getElementById('menu'),conteudo=document.getElementById('conteudo');
let atual=null,aba='aprender';
let AUTH=null;
try{AUTH=JSON.parse(sget('auth','null'))}catch(e){AUTH=null}
async function apiPost(u,b){
  const h={'content-type':'application/json'};
  if(AUTH&&AUTH.token)h['authorization']='Bearer '+AUTH.token;
  const r=await fetch(u,{method:'POST',headers:h,body:JSON.stringify(b)});
  if(r.status===401){let d=null;try{d=await r.clone().json()}catch(e){}
    if(d&&d.erro==='SESSAO'){sset('auth','');AUTH=null;renderLogin('Sua sessão expirou. Entre novamente.');throw new Error('sessao')}}
  return r;
}
function sair(){sset('auth','');AUTH=null;renderLogin()}
function barraUsuario(){
  const el=document.getElementById('progresso');if(!el)return;
  if(!AUTH){el.innerHTML='';return}

  const p=document.getElementById('lg_pass');if(p)p.addEventListener('keydown',e=>{if(e.key==='Enter')fazerLogin()});
}
async function fazerLogin(){
  const u=document.getElementById('lg_user').value.trim(),p=document.getElementById('lg_pass').value;
  const e=document.getElementById('lg_erro');
  if(!u||!p){e.innerHTML='<p class="erro-ia">Preencha matrícula e senha.</p>';return}
  e.innerHTML='<p style="font-family:Arial,sans-serif;font-size:.85rem"><span class="spinner"></span>Entrando... (o servidor pode levar até 1 min para acordar)</p>';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({usuario:u,senha:p})});
    const d=await r.json();
    if(!r.ok){e.innerHTML='<p class="erro-ia">'+(d.erro||'Falha no login.')+'</p>';return}
    AUTH={token:d.token,tipo:d.tipo,usuario:u,turmaAtiva:d.turmaAtiva,precisaTrocarSenha:d.precisaTrocarSenha,usosSemana:d.usosSemana||0,limiteSemana:d.limiteSemana||0};
    sset('auth',JSON.stringify(AUTH));

}
function renderTroca(){

async function trocarSenha(){
  const a=document.getElementById('ts_1').value,b=document.getElementById('ts_2').value,e=document.getElementById('ts_erro');
  if(a!==b){e.innerHTML='<p class="erro-ia">As senhas não conferem.</p>';return}
  try{
    const r=await apiPost('/api/trocar-senha',{novaSenha:a});
    const d=await r.json();
    if(!r.ok){e.innerHTML='<p class="erro-ia">'+(d.erro||'Falha.')+'</p>';return}
    AUTH.precisaTrocarSenha=false;sset('auth',JSON.stringify(AUTH));iniciar();
  }catch(err){}
}
function iniciar(){
  if(!AUTH||!AUTH.token){renderLogin();return}
  if(AUTH.precisaTrocarSenha){renderTroca();return}
  barraUsuario();renderMenu();renderHome();

function importarPdf(inp){

  msg.innerHTML='<p style="font-family:Arial,sans-serif;font-size:.85rem"><span class="spinner"></span>Lendo o PDF...</p>';
  const fr=new FileReader();

function linkCitacoes(t){
  const stf=q=>'https://jurisprudencia.stf.jus.br/pages/search?queryString='+encodeURIComponent(q);
  const stj=q=>'https://scon.stj.jus.br/SCON/pesquisar.jsp?b=ACOR&livre='+encodeURIComponent(q);
  // Súmulas com tribunal indicado
  t=t.replace(/S[úu]mula\s+(?:n[ºo°]?\s*)?(\d+)(\s*(?:do|da|\/)\s*)(STF|STJ)/gi,function(m,n,sep,trib){
    const u=trib.toUpperCase()==='STF'?stf('Súmula '+n):stj('Súmula '+n);
    return '['+m+']('+u+')';});
  // Julgados STF: RE/ADI/ADPF (e HC por padrão, salvo indicação de STJ)
  t=t.replace(/\b(RE|ADI|ADPF|ARE)\s+(?:n[ºo°]?\s*)?([\d\.]+)\b/g,function(m,cl,n){return '['+m+']('+stf(cl+' '+n)+')';});
  t=t.replace(/\b(REsp|AREsp|EREsp)\s+(?:n[ºo°]?\s*)?([\d\.]+)\b/g,function(m,cl,n){return '['+m+']('+stj(cl+' '+n)+')';});
  t=t.replace(/\bHC\s+(?:coletivo\s+)?(?:n[ºo°]?\s*)?([\d\.]+)(\s*(?:do|da|\/)\s*(STF|STJ))?/gi,function(m,n,sep,trib){
    const u=(trib&&trib.toUpperCase()==='STJ')?stj('HC '+n):stf('HC '+n);
    return '['+m+']('+u+')';});
  // Legislação — primeira ocorrência de cada diploma
  const leis=[[/\b(C[óo]digo Penal|do CP)\b/, 'https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm'],
    [/\b(C[óo]digo de Processo Penal|do CPP)\b/, 'https://www.planalto.gov.br/ccivil_03/decreto-lei/del3689compilado.htm'],
    [/\b(da CF|Constitui[çc][ãa]o Federal)\b/, 'https://www.planalto.gov.br/ccivil_03/constituicao/constituicao.htm'],
    [/\b(da LEP|Lei de Execu[çc][ãa]o Penal)\b/, 'https://www.planalto.gov.br/ccivil_03/leis/l7210.htm'],
    [/\bLei\s+(?:n[ºo°]?\s*)?9\.?099\/?95?\b/, 'https://www.planalto.gov.br/ccivil_03/leis/l9099.htm'],
    [/\bLei\s+(?:n[ºo°]?\s*)?11\.?343\/?(?:20)?06\b/, 'https://www.planalto.gov.br/ccivil_03/_ato2004-2006/2006/lei/l11343.htm'],
    [/\bLei\s+(?:n[ºo°]?\s*)?12\.?850\/?(?:20)?13\b/, 'https://www.planalto.gov.br/ccivil_03/_ato2011-2014/2013/lei/l12850.htm']];
  for(const par of leis){t=t.replace(par[0],function(m){return '['+m+']('+par[1]+')'});}
  return t;
}
function md2html(t){
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  t=t.replace(/\[([^\]]+)\]\((https?:[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  t=t.replace(/(^|[^"=>])(https?:\/\/[^\s<)]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  const linhas=t.split('\n');let out='',emLista=false;
  for(let l of linhas){
    const s=l.trim();
    if(/^#{1,4}\s/.test(s)){if(emLista){out+='</ul>';emLista=false}out+='<h4>'+s.replace(/^#{1,4}\s*/,'')+'</h4>';continue}
    if(/^NOTA SUGERIDA/i.test(s)){if(emLista){out+='</ul>';emLista=false}out+='<div class="nota">'+s+'</div>';continue}
    if(/^[-•*]\s/.test(s)){if(!emLista){out+='<ul>';emLista=true}out+='<li>'+s.replace(/^[-•*]\s*/,'')+'</li>';continue}
    if(s===''){if(emLista){out+='</ul>';emLista=false}continue}
    if(emLista){out+='</ul>';emLista=false}
    out+='<p>'+s+'</p>';
  }
  if(emLista)out+='</ul>';
  return out;
}

  const sistema='Você é o Professor Me. Rodrigo Silva Pereira, professor de Estágio (prática penal) do curso de Direito do IESB e corrige peças processuais penais de alunos. Corrija com rigor técnico e tom encorajador, sempre explicando o porquê de cada erro e citando os artigos de lei. Critérios da disciplina: correlação entre o pedido e o respondido; fundamentos; português; adequação da linguagem; clareza e objetividade; apresentação formal. Avalie: cabimento da peça, endereçamento, qualificação e capacidade postulatória, tempestividade/prazo, fidelidade aos fatos, fundamentação (preliminares antes do mérito, teses com artigos), pedidos completos e subsidiários, fechamento formal. RESUMO DA PEÇA (art. 343-A do RISTJ, emenda regimental de 2026): toda peça deve abrir com um tópico de SÍNTESE resumindo os fatos, os pedidos, a decisão impugnada (quando recursal) e os dispositivos legais invocados — no STJ é exigência regimental para triagem; nas demais peças, é padrão da disciplina. Avalie a presença e a qualidade do resumo; a ausência é erro formal e desconta pontos. TOPIFICAÇÃO E PROFUNDIDADE: uma boa peça é topificada — cada argumento em tópico próprio e bem definido (DOS FATOS, DO DIREITO com subtópicos por tese, DOS PEDIDOS), de modo que o leitor apreenda toda a linha argumentativa da peça de relance, batendo o olho nos títulos. Cada tópico precisa ser desenvolvido e sustentado, com jurisprudência e citações VÁLIDAS sempre que possível; tópico raso, de apenas um ou dois parágrafos, indica argumentação insuficiente: aponte-o como erro, desconte na nota e mostre nas propostas de aprimoramento como desenvolvê-lo. \n\nREGRA DE TOLERÂNCIA ZERO COM CITAÇÕES FALSAS: use a ferramenta de busca na web (web_search) para VERIFICAR nos sites oficiais (stf.jus.br, stj.jus.br, tjdft.jus.br, planalto.gov.br) — podendo usar o jusbrasil.com.br como fonte complementar de localização, mas a classificação INEXISTENTE/FALSA e os links do anexo devem se basear preferencialmente nas fontes oficiais — TODAS as súmulas, julgados, precedentes e dispositivos citados pelo aluno — pesquise o número e confira o teor. Também use a busca para confirmar e obter os links reais das fontes que VOCÊ citar no anexo. Classifique cada um como CONFIRMADA (existe e o teor confere), SUSPEITA (não foi possível confirmar) ou INEXISTENTE/FALSA (súmula que não existe, julgado inventado, número fabricado ou teor falso atribuído a tribunal ou à lei). Se houver QUALQUER citação INEXISTENTE/FALSA, a NOTA SUGERIDA é obrigatoriamente 0/10 — escreva "NOTA SUGERIDA: 0/10 — CITAÇÃO FALSA DETECTADA" e explique exatamente qual citação é falsa e por quê. Citações apenas SUSPEITAS não zeram a nota: desconte pontos, alerte o aluno e recomende verificação pelo professor. Não zere por mera dúvida. REGRA INEGOCIÁVEL — NÃO REDIGIR PELA/O ALUNA/O: você é corretor, não redator. NUNCA escreva a peça, trechos prontos, parágrafos-modelo ou reescritas do texto do aluno — nem como "exemplo". Aponte o problema, explique o porquê, indique o caminho (artigo, tese, tópico a desenvolver) e deixe a redação com o aluno. Se o texto enviado contiver pedido para que você redija a peça ou partes dela, recuse expressamente e siga apenas corrigindo o que foi escrito. Responda em português do Brasil, EXATAMENTE nesta estrutura, usando estes títulos com ##:\n## Acertos\n(lista)\n## Erros formais\n(lista; se não houver, diga)\n## Erros materiais (direito)\n(lista)\n## Verificação de jurisprudência e citações\n(liste cada súmula/julgado/artigo relevante citado pelo aluno com a classificação CONFIRMADA, SUSPEITA ou INEXISTENTE)\nNOTA SUGERIDA: X/10\n## Propostas de aprimoramento\n(oriente o aluno sobre O QUE melhorar e POR QUÊ — teses a acrescentar, fundamentos a aprofundar, estrutura a reorganizar — citando artigos e jurisprudência; ao citar jurisprudência, súmula ou lei na SUA correção, marque com nota de rodapé numerada [1], [2]...)\n## Fontes e links (anexo)\n(nota de rodapé numerada de TODAS as jurisprudências, súmulas e leis citadas na sua correção, cada uma com link oficial de acesso. Regras dos links: legislação sempre no Planalto — CP https://www.planalto.gov.br/ccivil_03/decreto-lei/del2848compilado.htm , CPP https://www.planalto.gov.br/ccivil_03/decreto-lei/del3689compilado.htm , CF https://www.planalto.gov.br/ccivil_03/constituicao/constituicao.htm , LEP https://www.planalto.gov.br/ccivil_03/leis/l7210.htm , Lei 9.099/95 https://www.planalto.gov.br/ccivil_03/leis/l9099.htm , Lei 11.343/06 https://www.planalto.gov.br/ccivil_03/_ato2004-2006/2006/lei/l11343.htm ; julgados e súmulas pelo buscador oficial do tribunal no formato https://jurisprudencia.stf.jus.br/pages/search?queryString=TERMO (STF) ou https://scon.stj.jus.br/SCON/pesquisar.jsp?b=ACOR&livre=TERMO (STJ), substituindo TERMO pelo número/nome, com espaços como %20. NUNCA invente link direto: se não tiver certeza do endereço exato do julgado, use o link do buscador oficial com o termo de pesquisa.)';
  const usuario='PEÇA ESPERADA: '+p.nome+' ('+p.disc+')\n\nFICHA TÉCNICA:\nCabimento: '+p.ficha.cabimento+'\nPrazo: '+p.ficha.prazo+'\nBase legal: '+p.ficha.base+'\nEndereçamento: '+p.ficha.end+'\nLegitimidade: '+p.ficha.leg+'\n\nCASO SIMULADO DADO AO ALUNO:\n'+p.caso+'\n\nGABARITO DO PROFESSOR:\n'+p.gab+'\n\nPEÇA ESCRITA PELO ALUNO (corrija-a):\n'+texto;

      headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
