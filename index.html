<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratório de Peças Penais — Estágio I e II · Prof. Rodrigo Silva</title>
<style>
:root{
  --azul:#1e3a5f; --azul-esc:#152a46; --dourado:#c9a227; --dourado-claro:#f3e7c3;
  --fundo:#f6f4ef; --card:#ffffff; --texto:#2b2b2b; --cinza:#6b7280; --verde:#2e7d32; --vermelho:#b3261e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,'Times New Roman',serif;background:var(--fundo);color:var(--texto);line-height:1.55}
header{background:var(--azul);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:1.25rem;font-weight:600}
header .sub{color:var(--dourado-claro);font-size:.85rem;font-family:Arial,sans-serif}
.layout{display:flex;min-height:calc(100vh - 64px)}
nav{width:280px;background:var(--azul-esc);color:#e8e8e8;padding:16px 0;flex-shrink:0}
nav .grupo{padding:10px 20px 4px;font-family:Arial,sans-serif;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dourado)}
nav button.item{display:block;width:100%;text-align:left;background:none;border:none;color:#dcdcdc;padding:9px 20px;font-size:.92rem;cursor:pointer;font-family:Georgia,serif;border-left:3px solid transparent}
nav button.item:hover{background:rgba(255,255,255,.06)}
nav button.item.ativo{background:rgba(201,162,39,.15);border-left-color:var(--dourado);color:#fff}
nav button.item .feito{color:var(--dourado);font-size:.8rem;margin-left:6px}
main{flex:1;padding:28px 34px;max-width:980px}
.abas{display:flex;gap:8px;margin:18px 0 22px;font-family:Arial,sans-serif}
.abas button{padding:9px 22px;border:1px solid var(--azul);background:#fff;color:var(--azul);border-radius:20px;cursor:pointer;font-size:.88rem}
.abas button.ativa{background:var(--azul);color:#fff}
.card{background:var(--card);border:1px solid #e3ded2;border-radius:10px;padding:22px 26px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
h2.titulo-peca{color:var(--azul);font-size:1.5rem;margin-bottom:2px}
.badge{display:inline-block;font-family:Arial,sans-serif;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;background:var(--dourado-claro);color:#7a5c00;border-radius:12px;padding:3px 12px;margin-bottom:10px}
.ficha{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-top:12px}
.ficha .f{background:#faf8f2;border:1px solid #eee4c8;border-radius:8px;padding:12px 14px}
.ficha .f b{display:block;font-family:Arial,sans-serif;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--dourado);margin-bottom:4px}
.ficha .f span{font-size:.92rem}
.passo{border-left:3px solid var(--dourado);margin:14px 0;padding:2px 0 2px 16px}
.passo h4{color:var(--azul);font-size:1.02rem}
.passo p{font-size:.94rem;margin-top:4px}
.passo .ex{background:#f4f6fa;border-radius:6px;padding:10px 14px;margin-top:8px;font-size:.88rem;font-style:italic;color:#3d4a5c;white-space:pre-wrap}
.caso{background:#fbf7ec;border:1px solid #e8d9a8;border-radius:8px;padding:18px 20px;font-size:.96rem;white-space:pre-wrap}
.caso h3,.card h3{color:var(--azul);margin-bottom:8px}
textarea.redacao{width:100%;min-height:340px;margin-top:14px;padding:16px;font-family:'Times New Roman',serif;font-size:1rem;border:1px solid #cfc9b8;border-radius:8px;resize:vertical;line-height:1.7}
.botoes{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;font-family:Arial,sans-serif}
.botoes button{padding:9px 18px;border-radius:6px;border:1px solid var(--azul);background:#fff;color:var(--azul);cursor:pointer;font-size:.85rem}
.botoes button.primario{background:var(--azul);color:#fff}
.botoes button:hover{opacity:.88}
.check{margin-top:10px}
.check label{display:flex;gap:10px;align-items:flex-start;padding:7px 4px;font-size:.93rem;cursor:pointer;border-bottom:1px dashed #eee}
.check input{margin-top:4px;accent-color:var(--azul)}
.score{font-family:Arial,sans-serif;font-weight:bold;margin-top:12px;color:var(--azul)}
.gabarito{display:none;margin-top:14px}
.gabarito.aberto{display:block}
.gabarito .bloco{background:#eef5ee;border:1px solid #cfe3cf;border-radius:8px;padding:16px 18px;margin-top:10px;font-size:.94rem}
.gabarito .bloco p{margin-bottom:8px}
.gabarito .bloco a{color:var(--azul);word-break:break-all}
.gabarito .bloco h4{color:var(--azul);margin:10px 0 4px}
.aviso{font-size:.8rem;color:var(--cinza);font-family:Arial,sans-serif;margin-top:16px}
.home h2{color:var(--azul);margin-bottom:10px}
.home p{margin-bottom:10px}
.home .grade{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:18px}
.home .grade .g{background:#fff;border:1px solid #e3ded2;border-radius:10px;padding:16px;cursor:pointer}
.home .grade .g:hover{border-color:var(--dourado)}
.home .grade .g b{color:var(--azul)}
.home .grade .g small{color:var(--cinza);font-family:Arial,sans-serif}
.mat{list-style:none;padding:0}
.mat li{padding:7px 4px;border-bottom:1px dashed #eee;font-size:.94rem}
.mat a{color:var(--azul)}
.iabox{margin-top:14px}
.iabox .resultado{background:#f4f6fa;border:1px solid #d4dce8;border-radius:8px;padding:18px 20px;font-size:.94rem;margin-top:12px}
.iabox .resultado h4{color:var(--azul);margin:12px 0 4px}
.iabox .resultado h4:first-child{margin-top:0}
.iabox .resultado ul{margin:4px 0 8px 20px}
.iabox .resultado li{margin-bottom:4px}
.iabox .resultado a{color:var(--azul);word-break:break-all}
.iabox .resultado .nota{display:inline-block;background:var(--azul);color:#fff;border-radius:8px;padding:6px 16px;font-family:Arial,sans-serif;font-weight:bold;margin:6px 0}
.pbar{margin-top:12px;font-family:Arial,sans-serif}
.pbar .trilho{height:12px;background:#e8e4d8;border-radius:7px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.08)}
.pbar .fill{height:100%;width:2%;background:linear-gradient(90deg,var(--azul),#4a7ab5);border-radius:7px;transition:width .6s ease}
.pbar .etapa{font-size:.86rem;color:var(--azul);margin-top:7px}
.pbar .tempo{float:right;color:var(--cinza);font-size:.8rem}
.spinner{display:inline-block;width:16px;height:16px;border:3px solid #d4dce8;border-top-color:var(--azul);border-radius:50%;animation:gira .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes gira{to{transform:rotate(360deg)}}
.campo-chave{width:100%;padding:9px 12px;border:1px solid #cfc9b8;border-radius:6px;font-family:Arial,sans-serif;font-size:.85rem;margin-top:8px}
.erro-ia{color:var(--vermelho);font-size:.88rem;margin-top:10px;font-family:Arial,sans-serif}
.loginwrap{max-width:420px;margin:60px auto;background:#fff;border:1px solid #e3ded2;border-radius:12px;padding:30px 34px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.loginwrap h2{color:var(--azul);margin-bottom:6px}
.loginwrap p{font-size:.9rem;color:var(--cinza);margin-bottom:14px}
.loginwrap input{width:100%;padding:11px 13px;border:1px solid #cfc9b8;border-radius:6px;font-family:Arial,sans-serif;font-size:.95rem;margin-bottom:10px}
.loginwrap button{width:100%;padding:11px;border:none;border-radius:6px;background:var(--azul);color:#fff;font-size:.95rem;cursor:pointer;font-family:Arial,sans-serif}
.loginwrap .erro-ia{margin-top:8px}
.userbar{font-family:Arial,sans-serif;font-size:.8rem;color:var(--dourado-claro)}
.userbar a{color:#fff;margin-left:10px;cursor:pointer;text-decoration:underline}
.painel table{width:100%;border-collapse:collapse;font-size:.88rem;font-family:Arial,sans-serif;margin-top:10px}
.painel th,.painel td{border-bottom:1px solid #eee;padding:7px 8px;text-align:left}
.md-tab{width:100%;border-collapse:collapse;font-size:.86rem;font-family:Arial,sans-serif;margin:10px 0;background:#fff}
.md-tab td,.md-tab th{border:1px solid #d8d2c0;padding:6px 9px;text-align:left;vertical-align:top}
.md-tab tr:first-child td{background:#f2eee0;font-weight:bold}
.md-tab tr:last-child td{background:#eef5ee;font-weight:bold}
.painel textarea{width:100%;min-height:140px;padding:10px;border:1px solid #cfc9b8;border-radius:6px;font-family:monospace}
@media(max-width:820px){.layout{flex-direction:column}nav{width:100%;display:flex;flex-wrap:wrap}nav .grupo{width:100%}nav button.item{width:auto;border-left:none}main{padding:18px}}
</style>
</head>
<body>
<header>
  <div>
    <h1>⚖️ Laboratório de Peças Penais</h1>
    <div class="sub">Estágio I e II · NPJ/IESB · Prof. Me. Rodrigo Silva Pereira</div>
  </div>
  <div class="sub" id="progresso"></div>
</header>
<div class="layout">
  <nav id="menu"></nav>
  <main id="conteudo"></main>
</div>
<script>
// ================= Helpers =================
let store={};
function sget(k,d){try{return localStorage.getItem(k)??d}catch(e){return store[k]??d}}
function sset(k,v){try{localStorage.setItem(k,v)}catch(e){store[k]=v}}
const menu=document.getElementById('menu'),conteudo=document.getElementById('conteudo');
let AUTH=null; try{AUTH=JSON.parse(sget('auth','null'))}catch(e){AUTH=null}
async function apiPost(u,b){
  const h={'content-type':'application/json'};
  if(AUTH&&AUTH.token)h['authorization']='Bearer '+AUTH.token;
  const r=await fetch(u,{method:'POST',headers:h,body:JSON.stringify(b)});
  if(r.status===401){let d=null;try{d=await r.clone().json()}catch(e){}
    if(d&&d.erro==='SESSAO'){sair('Sua sessão expirou. Entre novamente.');throw new Error('sessao')}}
  return r;
}
async function apiGet(u){
  const h={};if(AUTH&&AUTH.token)h['authorization']='Bearer '+AUTH.token;
  const r=await fetch(u,{headers:h});
  if(r.status===401){let d=null;try{d=await r.clone().json()}catch(e){}
    if(d&&d.erro==='SESSAO'){sair('Sua sessão expirou. Entre novamente.');throw new Error('sessao')}}
  return r;
}
function esc(t){return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function md2html(t){
  t=esc(t);
  t=t.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  t=t.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g,'$1<i>$2</i>');
  t=t.replace(/\[([^\]]+)\]\((https?:[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  t=t.replace(/(^|[^"=>])(https?:\/\/[^\s<)]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
  const linhas=t.split('\n');let out='',lista=false,tabela=false;
  for(let l of linhas){const s2=l.trim();
    if(/^\|.*\|$/.test(s2)){
      if(lista){out+='</ul>';lista=false}
      if(/^\|[\s:|\-]+\|$/.test(s2))continue; // linha separadora |---|---|
      if(!tabela){out+='<table class="md-tab">';tabela=true}
      out+='<tr>'+s2.slice(1,-1).split('|').map(function(c){return '<td>'+c.trim()+'</td>'}).join('')+'</tr>';continue}
    if(tabela){out+='</table>';tabela=false}
    if(/^#{1,4}\s/.test(s2)){if(lista){out+='</ul>';lista=false}out+='<h4>'+s2.replace(/^#{1,4}\s*/,'')+'</h4>';continue}
    if(/^NOTA SUGERIDA/i.test(s2)){if(lista){out+='</ul>';lista=false}out+='<div class="nota">'+s2+'</div>';continue}
    if(/^[-•*]\s/.test(s2)){if(!lista){out+='<ul>';lista=true}out+='<li>'+s2.replace(/^[-•*]\s*/,'')+'</li>';continue}
    if(s2===''){if(lista){out+='</ul>';lista=false}continue}
    if(lista){out+='</ul>';lista=false}out+='<p>'+s2+'</p>';}
  if(lista)out+='</ul>';if(tabela)out+='</table>';return out;
}
function urlSTF(q){return 'https://jurisprudencia.stf.jus.br/pages/search?queryString='+encodeURIComponent(q)}
function urlSTJ(q){return 'https://scon.stj.jus.br/SCON/pesquisar.jsp?b=ACOR&livre='+encodeURIComponent(q)}
function linkCitacoesHtml(html){
  return html.split(/(<a\b[^>]*>[\s\S]*?<\/a>)/g).map(function(seg){
    if(/^<a\b/.test(seg))return seg;
    seg=seg.replace(/S[úu]mula\s+(?:n[ºo°]?\s*)?(\d+)(\s*(?:do|da|\/)\s*)(STF|STJ)/gi,function(m,n,sep,tr){const u=tr.toUpperCase()==='STF'?urlSTF('Súmula '+n):urlSTJ('Súmula '+n);return '<a href="'+u+'" target="_blank" rel="noopener">'+m+'</a>'});
    seg=seg.replace(/\b(RE|ADI|ADPF|ARE)\s+(?:n[ºo°]?\s*)?([\d\.]+)\b/g,function(m,cl,n){return '<a href="'+urlSTF(cl+' '+n)+'" target="_blank" rel="noopener">'+m+'</a>'});
    seg=seg.replace(/\b(REsp|AREsp|EREsp)\s+(?:n[ºo°]?\s*)?([\d\.]+)\b/g,function(m,cl,n){return '<a href="'+urlSTJ(cl+' '+n)+'" target="_blank" rel="noopener">'+m+'</a>'});
    seg=seg.replace(/\bHC\s+(?:coletivo\s+)?(?:n[ºo°]?\s*)?([\d\.]+)(\s*(?:do|da|\/)\s*(STF|STJ))?/gi,function(m,n,sep,tr){const u=(tr&&tr.toUpperCase()==='STJ')?urlSTJ('HC '+n):urlSTF('HC '+n);return '<a href="'+u+'" target="_blank" rel="noopener">'+m+'</a>'});
    return seg;
  }).join('');
}
function progresso(el,etapas,dur){
  el.innerHTML='<div class="pbar"><div class="trilho"><div class="fill"></div></div><div class="etapa"><span class="et"></span><span class="tempo"></span></div></div>';
  const fill=el.querySelector('.fill'),et=el.querySelector('.et'),tempo=el.querySelector('.tempo');const ini=Date.now();
  function tick(){const seg=(Date.now()-ini)/1000;const p=Math.min(95,95*(1-Math.exp(-seg/(dur/2.5))));fill.style.width=p.toFixed(1)+'%';let a=etapas[0];for(const par of etapas)if(seg>=par[0])a=par;et.textContent=a[1];const mm=Math.floor(seg/60),ss=Math.floor(seg%60);tempo.textContent='⏱ '+(mm?mm+'min ':'')+ss+'s';}
  tick();const iv=setInterval(tick,600);return{fim(){clearInterval(iv);try{fill.style.width='100%'}catch(e){}}};
}
const PECAS_ESTAGIO_I=['Queixa-Crime','Resposta à Acusação','Alegações Finais por Memoriais','Pedido de Liberdade Provisória','Relaxamento de Prisão em Flagrante','Revogação de Prisão Preventiva'];
const PECAS_ESTAGIO_II=['Apelação Criminal','Recurso em Sentido Estrito (RESE)','Contrarrazões de Apelação','Embargos de Declaração','Embargos Infringentes e de Nulidade','Agravo em Execução','Habeas Corpus','Revisão Criminal'];
// ================= Sessão / Login =================
function sair(msg){sset('auth','');AUTH=null;renderLogin(msg)}
function barra(){
  const el=document.getElementById('progresso');if(!el)return;
  if(!AUTH){el.innerHTML='';return}
  const nome=AUTH.nome?AUTH.nome.split(' ')[0]:'';
  const quem=AUTH.tipo==='professor'?(esc(AUTH.papel||'Professor')+' · '+esc(AUTH.nome||'')):('Olá, '+esc(nome||('Matrícula '+AUTH.usuario)));
  el.innerHTML='<span class="userbar">'+quem+'<a onclick="trocarMinhaSenha()">trocar senha</a><a onclick="sair()">sair</a></span>';
}
function renderLogin(msg){
  menu.innerHTML='';document.getElementById('progresso').innerHTML='';
  conteudo.innerHTML='<div class="loginwrap"><h2>⚖️ Laboratório de Peças Penais</h2>'
  +'<p>Entre com seu login. Alunos: use a matrícula (senha inicial = matrícula).</p>'
  +'<input id="lg_user" placeholder="Login / Matrícula" autocomplete="username">'
  +'<input id="lg_pass" type="password" placeholder="Senha" autocomplete="current-password">'
  +'<button onclick="fazerLogin()">Entrar</button>'
  +(msg?'<p class="erro-ia">'+esc(msg)+'</p>':'')+'<div id="lg_erro"></div></div>';
  const p=document.getElementById('lg_pass');if(p)p.addEventListener('keydown',e=>{if(e.key==='Enter')fazerLogin()});
}
async function fazerLogin(){
  const u=document.getElementById('lg_user').value.trim(),p=document.getElementById('lg_pass').value;
  const e=document.getElementById('lg_erro');
  if(!u||!p){e.innerHTML='<p class="erro-ia">Preencha login e senha.</p>';return}
  e.innerHTML='<p style="font-family:Arial,sans-serif;font-size:.85rem"><span class="spinner"></span>Entrando... (o servidor pode levar até 1 min para acordar)</p>';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({usuario:u,senha:p})});
    const d=await r.json();
    if(!r.ok){e.innerHTML='<p class="erro-ia">'+(d.erro||'Falha no login.')+'</p>';return}
    AUTH={token:d.token,tipo:d.tipo,usuario:u,nome:d.nome||'',papel:d.papel||'',admin:!!d.admin,gereProf:!!d.gereProf,gereCoord:!!d.gereCoord,turmaAtiva:d.turmaAtiva,precisaTrocarSenha:d.precisaTrocarSenha,emailVerificado:d.emailVerificado,email:d.email||''};
    sset('auth',JSON.stringify(AUTH));iniciar();
  }catch(err){e.innerHTML='<p class="erro-ia">Erro de conexão: '+err.message+'</p>'}
}
// Troca de senha (professor: só senha; aluno no 1º acesso: senha + e-mail)
function renderTroca(){
  menu.innerHTML='';
  const ehAluno=AUTH.tipo==='aluno';
  conteudo.innerHTML='<div class="loginwrap"><h2>Primeiro acesso</h2>'
  +'<p>Crie uma nova senha (mín. 6 caracteres'+(ehAluno?', diferente da matrícula':'')+').'+(ehAluno?' E cadastre seu e-mail para receber as correções.':' Cadastre seu e-mail para receber avisos de novas entregas.')+'</p>'
  +'<input id="ts_1" type="password" placeholder="Nova senha">'
  +'<input id="ts_2" type="password" placeholder="Repita a nova senha">'
  +'<input id="ts_email" type="email" placeholder="'+(ehAluno?'Seu e-mail (para receber correções)':'Seu e-mail (para receber avisos de entregas)')+'">'
  +'<button onclick="salvarTroca()">Salvar</button><div id="ts_erro"></div></div>';
}
async function salvarTroca(){
  const a=document.getElementById('ts_1').value,b=document.getElementById('ts_2').value,e=document.getElementById('ts_erro');
  if(a!==b){e.innerHTML='<p class="erro-ia">As senhas não conferem.</p>';return}
  const body={novaSenha:a};
  const em=(document.getElementById('ts_email').value||'').trim();
  if(AUTH.tipo==='aluno'){if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)){e.innerHTML='<p class="erro-ia">Informe um e-mail válido.</p>';return}body.email=em;}
  else if(em){if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)){e.innerHTML='<p class="erro-ia">E-mail inválido (ou deixe em branco).</p>';return}body.email=em;}
  e.innerHTML='<p style="font-family:Arial,sans-serif;font-size:.85rem"><span class="spinner"></span>Salvando...</p>';
  try{
    const r=await apiPost('/api/trocar-senha',body);const d=await r.json();
    if(!r.ok){e.innerHTML='<p class="erro-ia">'+(d.erro||'Falha.')+'</p>';return}
    AUTH.precisaTrocarSenha=false;
    if(AUTH.tipo==='aluno'){AUTH.email=body.email;AUTH.emailVerificado=false;sset('auth',JSON.stringify(AUTH));renderVerificarEmail(d.emailEnviado);}
    else{sset('auth',JSON.stringify(AUTH));iniciar();}
  }catch(err){}
}
function renderVerificarEmail(enviado){
  menu.innerHTML='';
  conteudo.innerHTML='<div class="loginwrap"><h2>Confirme seu e-mail</h2>'
  +'<p>Enviamos um código para <b>'+esc(AUTH.email)+'</b>. Digite-o abaixo para confirmar que o e-mail é seu.'+(enviado===false?' <span style="color:var(--vermelho)">(O envio pode estar indisponível — avise o professor.)</span>':'')+'</p>'
  +'<input id="vc" placeholder="Código de 6 dígitos" inputmode="numeric">'
  +'<button onclick="confirmarEmail()">Confirmar</button>'
  +'<p style="font-size:.82rem;margin-top:8px"><a style="cursor:pointer;color:var(--azul)" onclick="reenviarCodigo()">Reenviar código</a></p><div id="vc_erro"></div></div>';
}
async function confirmarEmail(){
  const c=document.getElementById('vc').value.trim(),e=document.getElementById('vc_erro');
  try{const r=await apiPost('/api/verificar-email',{codigo:c});const d=await r.json();
  if(!r.ok){e.innerHTML='<p class="erro-ia">'+(d.erro||'Código incorreto.')+'</p>';return}
  AUTH.emailVerificado=true;sset('auth',JSON.stringify(AUTH));iniciar();}catch(err){}
}
async function reenviarCodigo(){try{await apiPost('/api/reenviar-codigo',{});alert('Novo código enviado.')}catch(e){}}
function trocarMinhaSenha(){AUTH.precisaTrocarSenha=true;renderTroca();}
function iniciar(){
  if(!AUTH||!AUTH.token){renderLogin();return}
  if(AUTH.precisaTrocarSenha){renderTroca();return}
  if(AUTH.tipo==='aluno'&&!AUTH.emailVerificado){renderVerificarEmail();return}
  barra();

function dataBR(iso){if(!iso)return '';const p=iso.split('T')[0].split('-');return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):iso;}
function dataHoraBR(iso){if(!iso)return '';const t=iso.split('T');const dd=dataBR(t[0]);const hh=t[1]?(' às '+t[1].slice(0,5)):'';return dd+hh;}

async function corrigirEntregaIA(){

    const r=await apiPost('/api/entrega/corrigir',{id:window.__ent.id,matricula:window.__ent.mat});

  RASCUNHO={id:p.id,nomePeca:p.nomePeca,disc:p.disc,caso:p.caso,gab:p.gab};
  ABA_PROF='nova';telaProfessor();
  setTimeout(()=>{document.getElementById('np_caso').value=p.caso;document.getElementById('np_gab').value=p.gab;if(p.prazo)document.getElementById('np_prazo').value=p.prazo;const s=document.getElementById('np_nome');if(s)s.value=p.nomePeca;},50);
}
// ---- Alunos ----
async function profAlunos(dadosPrev){
  let dados=dadosPrev;
  if(!dados){conteudo.innerHTML='<p><span class="spinner"></span>Carregando...</p>';try{const r=await apiPost('/api/admin',{});dados=await r.json();}catch(e){return}}
  let linhas='';
  for(const a of (dados.alunos||[]))linhas+='<tr><td>'+a.matricula+'</td><td>'+esc(a.nome||'—')+'</td><td>'+(a.trocouSenha?'✓':'inicial')+'</td><td><a style="cursor:pointer;color:var(--azul)" onclick="resetSenha(\''+a.matricula+'\')">reset senha</a> · <a style="cursor:pointer;color:var(--vermelho)" onclick="excluirAl(\''+a.matricula+'\')">excluir</a></td></tr>';
  conteudo.innerHTML='<h2 class="titulo-peca">Alunos</h2>'
   +'<div class="card"><h3>Turma ativa</h3><div class="botoes">'
   +'<button class="'+(dados.turmaAtiva==='Estágio I'?'primario':'')+'" onclick="setTurma(\'Estágio I\')">Estágio I</button>'
   +'<button class="'+(dados.turmaAtiva==='Estágio II'?'primario':'')+'" onclick="setTurma(\'Estágio II\')">Estágio II</button></div>'
   +'<p class="aviso">Alunos só veem as peças da turma ativa. Atual: <b>'+esc(dados.turmaAtiva)+'</b></p></div>'
   +'<div class="card painel"><h3>Matrículas ('+(dados.totalAlunos||0)+')</h3>'
   +'<p style="font-size:.88rem;color:var(--cinza)">Cole matrículas (uma por linha; pode ser "matrícula - nome") ou importe do PDF do diário.</p>'
   +'<div class="botoes" style="margin-bottom:8px"><label class="primario" style="padding:9px 18px;border-radius:6px;background:var(--azul);color:#fff;cursor:pointer;font-size:.85rem;font-family:Arial,sans-serif">📄 Importar PDF<input type="file" accept="application/pdf" style="display:none" onchange="importarPdfAlunos(this)"></label></div>'
   +'<textarea id="adm_mats" placeholder="500123 - Fulano"></textarea>'
   +'<div class="botoes"><button class="primario" onclick="salvarAlunos(false)">Adicionar</button><button onclick="if(confirm(\'Substituir TODA a lista?\'))salvarAlunos(true)">Substituir lista</button><button style="border-color:var(--vermelho);color:var(--vermelho)" onclick="excluirTodosAl()">🗑 Excluir todos</button></div><div id="adm_msg"></div>'
   +'<table><tr><th>Matrícula</th><th>Nome</th><th>Senha</th><th></th></tr>'+(linhas||'<tr><td colspan="4">Nenhum aluno.</td></tr>')+'</table></div>';
}
async function setTurma(t){const r=await apiPost('/api/admin',{turma:t});const d=await r.json();if(r.ok){AUTH.turmaAtiva=t;sset('auth',JSON.stringify(AUTH));profAlunos(d)}}
async function salvarAlunos(sub){const txt=document.getElementById('adm_mats').value;const mats=txt.split(/\n+/).map(x=>x.trim()).filter(x=>x);if(!mats.length){document.getElementById('adm_msg').innerHTML='<p class="erro-ia">Cole ao menos uma matrícula.</p>';return}const r=await apiPost('/api/admin',{matriculas:mats,substituir:!!sub});const d=await r.json();if(r.ok){profAlunos(d);setTimeout(()=>{const m=document.getElementById('adm_msg');if(m)m.innerHTML='<p style="color:var(--verde);font-family:Arial,sans-serif;font-size:.85rem"><b>'+(d.novas||0)+' novo(s).</b> '+((d.existentes||0)?d.existentes+' já existiam (ignorados).':'')+'</p>'},80)}}
async function resetSenha(m){if(!confirm('Resetar senha de '+m+' para a matrícula?'))return;const r=await apiPost('/api/admin',{resetarSenha:m});profAlunos(await r.json());}
async function excluirAl(m){if(!confirm('Excluir '+m+'?'))return;const r=await apiPost('/api/admin',{excluirAluno:m});profAlunos(await r.json());}
async function excluirTodosAl(){if(!confirm('Excluir TODOS os alunos?'))return;if(!confirm('Tem certeza? Não há retorno.'))return;const r=await apiPost('/api/admin',{excluirTodos:true});profAlunos(await r.json());}
function importarPdfAlunos(inp){const f=inp.files&&inp.files[0];if(!f)return;const msg=document.getElementById('adm_msg');msg.innerHTML='<p style="font-family:Arial,sans-serif;font-size:.85rem"><span class="spinner"></span>Lendo o PDF com IA...</p>';const fr=new FileReader();fr.onload=async function(){try{const r=await apiPost('/api/extrair-pdf',{pdf:fr.result});const d=await r.json();if(!r.ok){msg.innerHTML='<p class="erro-ia">'+(d.erro||'Erro')+'</p>';return}document.getElementById('adm_mats').value=d.alunos.map(a=>a.matricula+(a.nome?' - '+a.nome:'')).join('\n');msg.innerHTML='<p style="color:var(--verde);font-family:Arial,sans-serif;font-size:.85rem"><b>'+d.alunos.length+' alunos encontrados.</b> Revise e clique em Adicionar ou Substituir.</p>';}catch(e){msg.innerHTML='<p class="erro-ia">Falha: '+e.message+'</p>';}};fr.readAsDataURL(f);inp.value='';}

// ---- Notas / planilha ----
function profNotas(){
  conteudo.innerHTML='<h2 class="titulo-peca">Notas</h2>'
   +'<div class="card"><p>Baixe a planilha com todos os alunos e as notas de cada peça (formato CSV, abre no Excel).</p>'
   +'<div class="botoes"><button class="primario" onclick="baixarPlanilha()">📊 Baixar planilha de notas (.csv)</button></div>'
   +'<p class="aviso">Colunas: Aluno · Matrícula · Peça 1 · Peça 2 · … com a nota validada de cada um.</p></div>';
}
async function baixarPlanilha(){
  try{const r=await apiGet('/api/notas.csv');const blob=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='notas.csv';a.click();}catch(e){alert('Falha ao baixar.')}
}

// ---- Sistema (zerar) ----
function profConfig(){
  conteudo.innerHTML='<h2 class="titulo-peca">Sistema</h2>'
   +'<div class="card"><h3>Zerar todo o sistema</h3>'
   +'<p style="color:var(--vermelho)"><b>⚠️ ATENÇÃO:</b> apaga TODAS as peças, entregas, notas e alunos cadastrados. As contas de professores/coordenação são mantidas. <b>Não há retorno.</b></p>'
   +'<div class="botoes"><button style="background:var(--vermelho);color:#fff;border:none" onclick="zerarTudo()">🗑 Zerar tudo (irreversível)</button></div><div id="zfb"></div></div>';
}
async function zerarTudo(){
  if(!confirm('ZERAR TODO O SISTEMA? Apaga peças, entregas, notas e alunos. NÃO HÁ RETORNO.'))return;
  const c=prompt('Para confirmar, digite ZERAR (em maiúsculas):');
  if(c!=='ZERAR'){document.getElementById('zfb').innerHTML='<p class="aviso">Cancelado.</p>';return}
  try{const r=await apiPost('/api/zerar',{confirmacao:'ZERAR'});const d=await r.json();if(r.ok)document.getElementById('zfb').innerHTML='<p style="color:var(--verde)">Sistema zerado.</p>';else document.getElementById('zfb').innerHTML='<p class="erro-ia">'+(d.erro||'Erro')+'</p>';}catch(e){}
}

// ---- Professores / Coordenadores ----
async function profProfessores(){
  conteudo.innerHTML='<h2 class="titulo-peca">Professores</h2><div id="lpr"><p><span class="spinner"></span>Carregando...</p></div>';
  try{const r=await apiGet('/api/professores');const d=await r.json();
    if(!r.ok){document.getElementById('lpr').innerHTML='<p class="erro-ia">'+(d.erro||'Erro')+'</p>';return}
    const admin=!!d.souAdmin;
    let form='<div class="card"><h3>Cadastrar '+(admin?'professor(a) ou coordenador(a)':'professor(a)')+'</h3>'
      +'<p style="font-size:.85rem;color:var(--cinza)">A senha inicial é o próprio login; a pessoa troca no primeiro acesso.</p>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;font-family:Arial,sans-serif;align-items:center">'
      +'<input id="pr_login" placeholder="Login (sem espaços)" style="padding:8px;border:1px solid #cfc9b8;border-radius:6px">'
      +'<input id="pr_nome" placeholder="Nome completo" style="padding:8px;border:1px solid #cfc9b8;border-radius:6px">'
      +(admin?'<select id="pr_papel" style="padding:8px;border:1px solid #cfc9b8;border-radius:6px"><option value="Professor">Professor(a)</option><option value="Coordenador">Coordenador(a)</option></select>':'<input type="hidden" id="pr_papel" value="Professor">')
      +'<button class="primario" onclick="salvarProfessor()">Cadastrar</button></div><div id="pr_fb"></div></div>';
    let tab='<div class="card painel"><h3>Cadastrados ('+d.professores.length+')</h3><table class="painel"><tr><th>Login</th><th>Nome</th><th>Papel</th><th>Senha</th><th></th></tr>';
    for(const p of d.professores){
      const podeMexer=!p.admin && p.login!==d.meuLogin && (admin || p.papel!=='Coordenador');
      let acoes='<span style="color:var(--cinza)">—</span>';
      if(p.login===d.meuLogin) acoes='<span style="color:var(--dourado)">você</span>';
      else if(podeMexer) acoes='<a style="cursor:pointer;color:var(--azul)" onclick="resetProfessor(\''+p.login+'\')">resetar senha</a> · <a style="cursor:pointer;color:var(--vermelho)" onclick="excluirProfessor(\''+p.login+'\')">excluir</a>';
      tab+='<tr><td>'+esc(p.login)+'</td><td>'+esc(p.nome||'—')+'</td><td>'+esc(p.papel)+(p.admin?' 👑':'')+'</td><td>'+(p.mudouSenha?'✓ trocada':'inicial')+'</td><td>'+acoes+'</td></tr>';
    }
    tab+='</table></div>';
    document.getElementById('lpr').innerHTML=form+tab;
  }catch(e){document.getElementById('lpr').innerHTML='<p class="erro-ia">Falha ao carregar.</p>';}
}
async function salvarProfessor(){
  const login=document.getElementById('pr_login').value.trim();
  const nome=document.getElementById('pr_nome').value.trim();
  const papel=document.getElementById('pr_papel').value;
  const fb=document.getElementById('pr_fb');
  if(!login){fb.innerHTML='<p class="erro-ia">Informe o login.</p>';return}
  const r=await apiPost('/api/professores/salvar',{login,nome,papel});const d=await r.json();
  if(!r.ok){fb.innerHTML='<p class="erro-ia">'+(d.erro||'Erro')+'</p>';return}
  if(d.novo)alert('Cadastrado(a)!\n\nLogin: '+login+'\nSenha inicial: '+login+'\n\nA pessoa troca a senha no primeiro acesso.');
  profProfessores();
}
async function excluirProfessor(login){
  if(!confirm('Remover '+login+' do sistema? As peças criadas por essa pessoa continuam no banco.'))return;
  const r=await apiPost('/api/professores/excluir',{login});const d=await r.json();
  if(!r.ok){alert(d.erro||'Erro');return}
  profProfessores();
}
async function resetProfessor(login){
  if(!confirm('Resetar a senha de '+login+' para o próprio login? A pessoa troca no próximo acesso.'))return;
  const r=await apiPost('/api/professores/reset',{login});const d=await r.json();
  if(!r.ok){alert(d.erro||'Erro');return}
  alert('Senha resetada. Nova senha inicial: '+login);
  profProfessores();
}

// ================= ALUNO =================
async function telaAluno(){
  menu.innerHTML='<div class="grupo">Minhas peças</div><div class="grupo" style="margin-top:18px">Minha conta</div><button class="item" style="color:#e08a8a" onclick="descadastrar()">Sair do sistema e apagar meus dados</button>';
  conteudo.innerHTML='<h2 class="titulo-peca">Peças para entregar</h2><div id="la"><p><span class="spinner"></span>Carregando...</p></div>';
  try{const r=await apiGet('/api/pecas-aluno');const d=await r.json();
    if(!r.ok){document.getElementById('la').innerHTML='<p class="erro-ia">'+(d.erro||'Erro')+'</p>';return}
    if(!d.pecas.length){document.getElementById('la').innerHTML='<div class="card" style="text-align:center;padding:40px"><h3 style="color:var(--azul)">⏳ Aguarde o envio do(a) Professor(a)</h3><p style="color:var(--cinza)">Nenhuma peça foi publicada ainda para a sua turma. Assim que o(a) professor(a) enviar uma peça, ela aparecerá aqui com o prazo de entrega.</p></div>';return}
    let cards='';
    for(const p of d.pecas){
      const st=p.validado?('✅ Corrigida — nota '+(p.nota!=null?String(p.nota).replace('.',','):'—')):(p.enviado?'📤 Enviada — aguardando correção':(p.noPrazo?'⏳ A fazer':'🔴 Prazo encerrado'));
      const fechado=!p.enviado&&!p.noPrazo;
      cards+='<div class="card"><span class="badge">Peça '+p.num+'</span> <b>'+esc(p.nomePeca)+'</b>'
       +'<p style="font-family:Arial,sans-serif;font-size:.85rem;color:'+(fechado?'var(--vermelho)':'var(--cinza)')+'">Prazo: '+(p.prazo?dataHoraBR(p.prazo):'sem prazo')+' · '+st+'</p>'
       +'<div class="botoes"><button class="primario" onclick="abrirPecaAluno(\''+p.id+'\')">'+(p.enviado?(p.gabLiberado?'Ver peça e gabarito':'Ver / reenviar'):(fechado?'Ver enunciado':'Fazer esta peça'))+'</button>'
       +(p.gabLiberado?'<button onclick="abrirPecaAluno(\''+p.id+'\')">📖 Gabarito</button>':'')
       +(p.temRelatorio?'<button onclick="verMinhaCorrecao(\''+p.id+'\')">Ver correção</button>':'')+'</div></div>';
    }
    document.getElementById('la').innerHTML=cards;
    window.__pecasAluno=d.pecas;
  }catch(e){document.getElementById('la').innerHTML='<p class="erro-ia">Falha ao carregar.</p>';}
}
async function descadastrar(){
  if(!confirm('Tem certeza que deseja SAIR do sistema?\n\nSeu nome será APAGADO da lista da turma e você perderá o acesso às peças e correções já enviadas. Esta ação NÃO pode ser desfeita.'))return;
  const txt=prompt('Para confirmar, digite SAIR (em maiúsculas):');
  if(txt!=='SAIR'){alert('Descadastro cancelado.');return}
  try{const r=await apiPost('/api/descadastrar',{});const d=await r.json();
    if(!r.ok){alert(d.erro||'Não foi possível concluir o descadastro.');return}
    alert('Você foi descadastrado(a). Seu nome foi apagado da lista da turma.');
    sair('Cadastro removido. Até logo!');
  }catch(e){alert('Falha de conexão. Tente novamente.');}
}
function abrirPecaAluno(id){
  const p=(window.__pecasAluno||[]).find(x=>x.id===id);if(!p)return;
  const rasc=sget('peca_'+id,'');
  const fechado=!p.enviado&&!p.noPrazo;
  conteudo.innerHTML='<div class="botoes" style="margin-bottom:10px"><button onclick="telaAluno()">← Voltar</button></div>'
   +'<span class="badge">Peça '+p.num+' · '+esc(p.disc)+'</span><h2 class="titulo-peca">'+esc(p.nomePeca)+'</h2>'
   +'<p style="font-family:Arial,sans-serif;font-size:.85rem;color:'+(fechado?'var(--vermelho)':'var(--cinza)')+'">Prazo: '+(p.prazo?dataHoraBR(p.prazo):'sem prazo')+(fechado?' — PRAZO ENCERRADO':'')+'</p>'
   +'<div class="card"><h3>Enunciado</h3><div class="caso">'+esc(p.caso)+'</div></div>'
   +((p.gabLiberado&&p.gab)?'<div class="card"><h3>📖 Gabarito oficial</h3><p style="font-size:.82rem;color:var(--cinza);font-family:Arial,sans-serif">Liberado após o encerramento do prazo. Compare com a sua peça e confira as fontes pelos links.</p><div class="bloco" style="background:#eef5ee;border:1px solid #cfe3cf;border-radius:8px;padding:14px">'+linkCitacoesHtml(md2html(p.gab))+'</div></div>':'')
   +(fechado?'<div class="card"><p class="erro-ia">O prazo desta peça já encerrou. Não é possível enviar. Se precisar, fale com o(a) professor(a) para renovar o prazo ou liberar sua entrega.</p></div>'
     :('<div class="card"><h3>Sua peça</h3><p style="font-size:.85rem;color:var(--cinza)">Redija a peça completa. Se citar jurisprudência, inclua no FINAL um anexo com as fontes e seus links. O texto fica salvo neste navegador até você enviar.</p>'
   +'<textarea id="al_texto" class="redacao" placeholder="EXCELENTÍSSIMO SENHOR...">'+esc(rasc)+'</textarea>'
   +'<div class="botoes"><button onclick="salvarRascunhoAluno(\''+id+'\')">💾 Salvar rascunho</button>'
   +'<button class="primario" onclick="enviarPeca(\''+id+'\')">📨 Enviar ao professor</button></div>'
   +(p.enviado?'<p class="aviso">Você já enviou esta peça. Reenviar substitui a anterior e cancela a correção pendente.</p>':'')
   +'<div id="al_fb"></div></div>'));
  const t=document.getElementById('al_texto');if(t)t.addEventListener('input',()=>sset('peca_'+id,t.value));
}
function salvarRascunhoAluno(id){sset('peca_'+id,document.getElementById('al_texto').value);document.getElementById('al_fb').innerHTML='<p style="color:var(--verde);font-family:Arial,sans-serif;font-size:.85rem">Rascunho salvo.</p>';}
async function enviarPeca(id){
  const texto=document.getElementById('al_texto').value.trim();const fb=document.getElementById('al_fb');
  if(texto.length<80){fb.innerHTML='<p class="erro-ia">Escreva sua peça antes de enviar.</p>';return}
  if(!confirm('Enviar sua peça ao professor? Após o prazo pode não ser possível reenviar.'))return;
  try{const r=await apiPost('/api/entregar',{id,texto});const d=await r.json();
  if(!r.ok){let m=(d.erro||'Erro');if(m==='PRAZO')m='⏰ O prazo desta peça encerrou ('+dataHoraBR(d.prazo)+'). Fale com o(a) professor(a) para renovar ou liberar sua entrega.';fb.innerHTML='<p class="erro-ia">'+m+'</p>';return}
  sset('peca_'+id,'');
  fb.innerHTML='<p style="color:var(--verde);font-family:Arial,sans-serif">📨 Peça enviada! O professor foi avisado. Você receberá a correção por e-mail.</p>';
  setTimeout(telaAluno,1200);
  }catch(e){}
}
function verMinhaCorrecao(id){alert('A correção validada foi enviada ao seu e-mail cadastrado. Confira sua caixa de entrada (e o spam).');}

iniciar();
</script>
